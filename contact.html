<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — The Whole Book</title>
  <meta name="description" content="Get in touch with The Whole Book team.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#3D0E0E;--paper:#FAF6EE;--paper-dark:#EDE5D5;--red:#7B1A1A;--red-dark:#5C1010;--gold:#A0652A;--white:#FFFDF8;--gray:#8B7055;--border:#3D0E0E;--font-display:'Cinzel',Georgia,serif;--font-serif:'Playfair Display',Georgia,serif;--font-mono:'Space Mono',monospace}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:var(--paper);color:var(--ink);font-family:var(--font-serif);overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:0.4}
    .site-header{border-bottom:3px solid var(--border);background:var(--paper);color:var(--ink);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .site-logo{font-family:var(--font-display);font-size:clamp(1.1rem,2.5vw,1.6rem);letter-spacing:0.05em;color:var(--ink);text-decoration:none;padding:0.5rem 0;display:flex;align-items:center;gap:0.7rem}
    .site-logo .logo-img{height:62px;width:62px;object-fit:contain;flex-shrink:0;border-radius:10px;border:2px solid var(--red)}
    .site-logo .logo-accent{color:var(--red)}
    .site-logo .logo-mark{display:none}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:0.7}}
    .site-nav{display:flex;gap:0}
    .site-nav a{font-family:var(--font-mono);font-size:0.7rem;text-transform:uppercase;letter-spacing:0.15em;color:var(--ink);text-decoration:none;padding:1.1rem 1.2rem;border-left:1px solid rgba(61,14,14,0.12);transition:background 0.2s,color 0.2s}
    .site-nav a:hover,.site-nav a.active{background:var(--red);color:var(--white)}

    .page-hero{background:var(--paper);color:var(--ink);padding:4rem;border-bottom:3px solid var(--border)}
    .page-eyebrow{font-family:var(--font-mono);font-size:0.7rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--red);margin-bottom:1rem;display:flex;align-items:center;gap:0.8rem}
    .page-eyebrow::before{content:'';display:block;width:40px;height:2px;background:var(--red)}
    .page-title{font-family:var(--font-display);font-size:clamp(4rem,8vw,7rem);line-height:0.95;letter-spacing:0.02em;margin-bottom:1rem}
    .page-subtitle{font-family:var(--font-serif);font-style:italic;font-size:1.1rem;line-height:1.65;color:var(--gray);max-width:520px}

    .contact-section{padding:5rem 4rem;flex:1;max-width:760px}

    .contact-form{display:flex;flex-direction:column;gap:1.5rem}

    .form-group{display:flex;flex-direction:column;gap:0.5rem}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}

    label{font-family:var(--font-mono);font-size:0.65rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--gray)}

    input,textarea{font-family:var(--font-serif);font-size:1rem;color:var(--ink);background:var(--white);border:2px solid var(--ink);padding:0.75rem 1rem;outline:none;transition:border-color 0.2s,box-shadow 0.2s;width:100%}
    input:focus,textarea:focus{border-color:var(--red);box-shadow:3px 3px 0 var(--red)}
    textarea{min-height:160px;resize:vertical;line-height:1.65}
    input::placeholder,textarea::placeholder{color:#aaa}

    .btn-submit{font-family:var(--font-display);font-size:1.4rem;letter-spacing:0.08em;background:var(--ink);color:var(--paper);border:2px solid var(--ink);padding:0.9rem 2.5rem;cursor:pointer;transition:background 0.2s,color 0.2s,transform 0.1s;align-self:flex-start}
    .btn-submit:hover{background:var(--red);border-color:var(--red)}
    .btn-submit:active{transform:scale(0.98)}
    .btn-submit:disabled{opacity:0.5;cursor:not-allowed}

    .form-status{font-family:var(--font-mono);font-size:0.7rem;letter-spacing:0.1em;padding:0.9rem 1.2rem;border:2px solid;display:none}
    .form-status.success{border-color:green;color:green;background:#f0fff0}
    .form-status.error{border-color:var(--red);color:var(--red);background:#fff5f5}
    .form-status.show{display:block}

    footer{background:var(--ink);color:var(--paper);padding:2.5rem 4rem;display:flex;align-items:center;justify-content:space-between;border-top:3px solid var(--border);flex-wrap:wrap;gap:1rem}
    .footer-brand{font-family:var(--font-display);font-size:1.8rem;letter-spacing:0.05em}
    .footer-copy{font-family:var(--font-mono);font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;color:rgba(245,240,232,0.35)}

    @media(max-width:900px){
      .contact-section{padding:3rem 2rem}
      .page-hero{padding:2.5rem 2rem}
      .site-nav{display:none}
      .form-row{grid-template-columns:1fr}
    }
  </style>
  <script defer src="https://cloud.umami.is/script.js" data-website-id="fb174b57-8599-455d-99a4-3d366b6eb23c"></script>
</head>
<body>

<header class="site-header">
  <a href="/" class="site-logo"><img src="Logo/twb-brown.jpg" alt="The Whole Book logo" class="logo-img">the<span class="logo-accent">wholebook</span>.org</a>
  <nav class="site-nav">
    <a href="/#search">Search</a>
    <a href="/#about">About</a>
    <a href="/#what-we-do">What We Do</a>
    <a href="/#most-banned">Most Banned</a>
    <a href="/#recently-added">Browse</a>
    <a href="/contact.html" class="active">Contact</a>
  </nav>
</header>

<div class="page-hero">
  <div class="page-eyebrow">Get in Touch</div>
  <h1 class="page-title">Contact</h1>
  <p class="page-subtitle">Questions, tips, corrections, or just want to help? We read every message.</p>
</div>

<div class="contact-section">
  <form class="contact-form" id="contactForm">
    <input type="hidden" name="access_key" value="3b9eb5fd-7ba0-416a-a8f1-18be72003e7d" />
    <input type="hidden" name="subject" value="New message from The Whole Book contact form" />
    <input type="hidden" name="from_name" value="The Whole Book" />
    <input type="checkbox" name="botcheck" style="display:none" />

    <div class="form-row">
      <div class="form-group">
        <label for="name">Your Name</label>
        <input type="text" id="name" name="name" placeholder="Jane Smith" required />
      </div>
      <div class="form-group">
        <label for="email">Your Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required />
      </div>
    </div>

    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder="Book challenges we've missed, corrections, media inquiries, or general feedback…" required></textarea>
    </div>

    <div class="form-status" id="formStatus"></div>

    <button type="submit" class="btn-submit" id="submitBtn">Send Message</button>
  </form>
</div>

<footer>
  <div class="footer-brand">The Whole Book</div>
  <p class="footer-copy">© 2025 The Whole Book — All books deserve to be read in full</p>
</footer>

<script>
  const form = document.getElementById('contactForm');
  const status = document.getElementById('formStatus');
  const btn = document.getElementById('submitBtn');

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    btn.disabled = true;
    btn.textContent = 'Sending…';
    status.className = 'form-status';
    status.textContent = '';

    const data = Object.fromEntries(new FormData(form));

    try {
      const res = await fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify(data)
      });
      const json = await res.json();
      if (json.success) {
        status.textContent = 'Message sent — we\'ll be in touch soon.';
        status.className = 'form-status success show';
        form.reset();
      } else {
        throw new Error(json.message || 'Submission failed.');
      }
    } catch(err) {
      status.textContent = 'Something went wrong. Please email us directly at sgoodwin06004@proton.me';
      status.className = 'form-status error show';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Send Message';
    }
  });
</script>
c
</body>
</html>
