<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Book — The Whole Book</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111318;
      --surface: #1a1d24;
      --surface2: #20242d;
      --border: #2e3240;
      --accent: #e8b86d;
      --accent-glow: rgba(232,184,109,0.15);
      --text: #edeef2;
      --muted: #6b7080;
      --success: #6fcf97;
      --error: #eb5757;
      --pro: #7eb8f7;
      --rated: #b89df7;
      --goodreads: #f47f3b;
      --goodreads-glow: rgba(244,127,59,0.12);
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      opacity: 0;
      transition: opacity 0.4s;
    }
    body.ready { opacity: 1; }

    nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(17,19,24,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 58px;
    }

    .nav-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }
    .nav-brand span { color: var(--accent); }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 13px;
      color: var(--muted);
    }

    .btn-ghost {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 2px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 52px 32px 80px;
    }

    .page-header {
      margin-bottom: 48px;
    }

    .page-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1;
      margin-bottom: 8px;
    }

    .page-header h1 span { color: var(--accent); }
    .page-header p { color: var(--muted); font-size: 14px; font-weight: 300; }

    /* Two-column grid for top row */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .form-full { margin-bottom: 20px; }

    /* Section cards */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 28px 28px 24px;
      position: relative;
    }

    .section::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      border-radius: 4px 4px 0 0;
    }

    .section.book-section::before      { background: var(--accent); }
    .section.rated-section::before     { background: var(--rated); }
    .section.pro-section::before       { background: var(--pro); }
    .section.goodreads-section::before { background: var(--goodreads); }

    .section-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section.book-section      .section-label { color: var(--accent); }
    .section.rated-section     .section-label { color: var(--rated); }
    .section.pro-section       .section-label { color: var(--pro); }
    .section.goodreads-section .section-label { color: var(--goodreads); }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .field { margin-bottom: 16px; }
    .field:last-child { margin-bottom: 0; }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .optional {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
      opacity: 0.7;
      margin-left: 3px;
    }

    input, textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 10px 13px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    /* Goodreads-specific focus color */
    .goodreads-section input:focus,
    .goodreads-section textarea:focus {
      border-color: var(--goodreads);
      box-shadow: 0 0 0 3px var(--goodreads-glow);
    }

    input::placeholder, textarea::placeholder { color: var(--muted); }
    textarea { resize: vertical; min-height: 100px; line-height: 1.6; }

    /* Submit */
    .submit-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      padding-top: 28px;
      border-top: 1px solid var(--border);
    }

    .submit-hint { font-size: 12px; color: var(--muted); font-weight: 300; }

    .btn-submit {
      background: var(--accent);
      color: #111318;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: none;
      padding: 13px 36px;
      border-radius: 2px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-submit:hover { opacity: 0.88; }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

    .spinner {
      display: none;
      width: 13px; height: 13px;
      border: 2px solid rgba(17,19,24,0.3);
      border-top-color: #111318;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-submit.loading .spinner { display: block; }
    .btn-submit.loading .btn-label { display: none; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 14px 20px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transform: translateY(80px);
      opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
      z-index: 200;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: var(--success); }
    .toast.error   { border-color: var(--error); }
    .toast-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .toast.success .toast-dot { background: var(--success); }
    .toast.error   .toast-dot { background: var(--error); }

    /* Multi-review items */
    .pro-review-item {
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 20px;
      margin-bottom: 16px;
      position: relative;
      background: var(--surface2);
      animation: slideIn 0.25s ease both;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .review-item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .review-item-num {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--pro);
      font-weight: 500;
    }
    .btn-remove-review {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      padding: 0 4px;
      transition: color 0.15s;
    }
    .btn-remove-review:hover { color: var(--error); }
    .btn-add-review {
      background: none;
      border: 1px dashed var(--border);
      color: var(--pro);
      font-family: "DM Sans", sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      padding: 10px 20px;
      border-radius: 2px;
      cursor: pointer;
      width: 100%;
      transition: border-color 0.2s, background 0.2s;
      margin-top: 4px;
    }
    .btn-add-review:hover { border-color: var(--pro); background: rgba(126,184,247,0.05); }

    @media (max-width: 768px) {
      .form-grid, .field-row { grid-template-columns: 1fr; }
      main { padding: 32px 16px 60px; }
      nav { padding: 0 16px; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-brand">The Whole<span>Book</span></div>
    <div class="nav-right">
      <span id="user-email-display"></span>
      <button class="btn-ghost" onclick="handleLogout()">Sign Out</button>
    </div>
  </nav>

  <main>
    <div class="page-header">
      <h1>Add a <span>Book</span></h1>
      <p>Enter book details, rated report, Goodreads data, and professional reviews in one submission.</p>
    </div>

    <!-- Top row: Book Details (left) + Rated Report (right) -->
    <div class="form-grid">

      <div class="section book-section">
        <div class="section-label">Book Details</div>
        <div class="field">
          <label>Title</label>
          <input type="text" id="b-title" placeholder="Book title" />
        </div>
        <div class="field">
          <label>Author</label>
          <input type="text" id="b-author" placeholder="Author name" />
        </div>
        <div class="field">
          <label>ISBN</label>
          <input type="text" id="b-isbn" placeholder="978-0-000-00000-0" />
        </div>
        <div class="field">
          <label>Cover Art URL <span class="optional">optional</span></label>
          <input type="url" id="b-cover" placeholder="https://…" />
        </div>
      </div>

      <div class="section rated-section">
        <div class="section-label">Rated Books Report</div>
        <div class="field">
          <label>Rating <span class="optional">1–5</span></label>
          <input type="number" id="r-rating" min="1" max="5" placeholder="e.g. 3" />
        </div>
        <div class="field">
          <label>Flagged Categories <span class="optional">optional</span></label>
          <input type="text" id="r-flagged" placeholder="e.g. Violence, Language, Sexual Content" />
        </div>
        <div class="field">
          <label>Excerpts <span class="optional">optional</span></label>
          <textarea id="r-excerpts" placeholder="Notable excerpts from the book…"></textarea>
        </div>
        <div class="field">
          <label>Report URL <span class="optional">optional</span></label>
          <input type="url" id="r-report-url" placeholder="https://ratedbooks.org/…" />
        </div>
      </div>

    </div>

    <!-- Goodreads section (full width) -->
    <div class="form-full">
      <div class="section goodreads-section">
        <div class="section-label">Goodreads</div>
        <div class="field-row">
          <div class="field">
            <label>Average Rating <span class="optional">optional</span></label>
            <input type="number" id="g-rating" min="1" max="5" step="0.01" placeholder="e.g. 4.12" />
          </div>
          <div class="field">
            <label>Goodreads URL <span class="optional">optional</span></label>
            <input type="url" id="g-url" placeholder="https://goodreads.com/book/show/…" />
          </div>
        </div>
        <div class="field">
          <label>Summary</label>
          <textarea id="g-summary" style="min-height:120px" placeholder="Paste or write the Goodreads book summary here…"></textarea>
        </div>
      </div>
    </div>

    <!-- Pro Reviews (full width, multiple) -->
    <div class="form-full">
      <div class="section pro-section">
        <div class="section-label">Professional Reviews</div>
        <div id="pro-reviews-list"></div>
        <button type="button" class="btn-add-review" onclick="addProReview()">+ Add Another Review</button>
      </div>
    </div>

    <div class="submit-row">
      <span class="submit-hint">All records will be saved together.</span>
      <button class="btn-submit" id="submitBtn" onclick="handleSubmit()">
        <span class="btn-label">Save Book</span>
        <div class="spinner"></div>
      </button>
    </div>
  </main>

  <div class="toast" id="toast">
    <div class="toast-dot"></div>
    <span id="toast-msg"></span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ⚠️ Replace SUPABASE_ANON_KEY with the full JWT key from:
    // Supabase Dashboard → Project Settings → API → anon / public key
    const SUPABASE_URL      = 'https://cqslqfztgtuuidgdkyyz.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_TBJdijzfEaYzBDBeqAy2CA_edJMKfgz';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let proReviewCount = 0;

    function addProReview() {
      proReviewCount++;
      const idx = proReviewCount;
      const list = document.getElementById('pro-reviews-list');
      const div = document.createElement('div');
      div.className = 'pro-review-item';
      div.id = 'pro-review-' + idx;
      div.innerHTML = `
        <div class="review-item-header">
          <span class="review-item-num">Review ${idx}</span>
          ${idx > 1 ? '<button type="button" class="btn-remove-review" onclick="removeProReview(' + idx + ')" title="Remove">×</button>' : ''}
        </div>
        <div class="field-row">
          <div class="field">
            <label>Source</label>
            <input type="text" id="p-source-${idx}" placeholder="e.g. Publishers Weekly, Booklist" />
          </div>
          <div class="field">
            <label>Award <span class="optional">optional</span></label>
            <input type="text" id="p-award-${idx}" placeholder="e.g. Newbery Medal" />
          </div>
        </div>
        <div class="field">
          <label>Review Summary</label>
          <textarea id="p-summary-${idx}" style="min-height:110px" placeholder="Paste or summarize the professional review here…"></textarea>
        </div>
        <div class="field">
          <label>Review URL <span class="optional">optional</span></label>
          <input type="url" id="p-url-${idx}" placeholder="https://…" />
        </div>`;
      list.appendChild(div);
    }

    function removeProReview(idx) {
      const el = document.getElementById('pro-review-' + idx);
      if (el) el.remove();
    }

    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = '/login.html'; return; }
      currentUser = session.user;
      document.getElementById('user-email-display').textContent = currentUser.email;
      document.body.classList.add('ready');
      addProReview();
    }

    async function handleLogout() {
      await sb.auth.signOut();
      window.location.href = '/login.html';
    }

    async function handleSubmit() {
      const title = document.getElementById('b-title').value.trim();
      if (!title) { showToast('Please enter a book title.', 'error'); return; }

      const btn = document.getElementById('submitBtn');
      btn.classList.add('loading');
      btn.disabled = true;

      try {
        // 1. Insert book
        const { data: book, error: bookErr } = await sb
          .from('books')
          .insert({
            title,
            author:    document.getElementById('b-author').value.trim() || null,
            isbn:      document.getElementById('b-isbn').value.trim()   || null,
            cover_url: document.getElementById('b-cover').value.trim()  || null,
          })
          .select('id')
          .single();

        if (bookErr) throw new Error('Book: ' + bookErr.message);
        const bookId = book.id;

        // 2. Insert rated report if any data entered
        const rating    = document.getElementById('r-rating').value;
        const flagged   = document.getElementById('r-flagged').value.trim();
        const excerpts  = document.getElementById('r-excerpts').value.trim();
        const reportUrl = document.getElementById('r-report-url').value.trim();

        if (rating || flagged || excerpts || reportUrl) {
          const { error: rErr } = await sb.from('rated_reports').insert({
            book_id:            bookId,
            user_id:            currentUser.id,
            rating:             rating ? parseInt(rating) : null,
            flagged_categories: flagged   || null,
            excerpts:           excerpts  || null,
            report_url:         reportUrl || null,
          });
          if (rErr) throw new Error('Rated report: ' + rErr.message);
        }

        // 3. Insert Goodreads data if any entered
        const gRating  = document.getElementById('g-rating').value;
        const gSummary = document.getElementById('g-summary').value.trim();
        const gUrl     = document.getElementById('g-url').value.trim();

        if (gRating || gSummary || gUrl) {
          const { error: gErr } = await sb.from('goodreads').insert({
            book_id:        bookId,
            user_id:        currentUser.id,
            average_rating: gRating  ? parseFloat(gRating) : null,
            summary:        gSummary || null,
            url:            gUrl     || null,
          });
          if (gErr) throw new Error('Goodreads: ' + gErr.message);
        }

        // 4. Insert all pro reviews
        const reviewItems = document.querySelectorAll('.pro-review-item');
        for (const item of reviewItems) {
          const idx     = item.id.replace('pro-review-', '');
          const source  = (document.getElementById('p-source-'  + idx) || {}).value?.trim();
          const award   = (document.getElementById('p-award-'   + idx) || {}).value?.trim();
          const summary = (document.getElementById('p-summary-' + idx) || {}).value?.trim();
          const proUrl  = (document.getElementById('p-url-'     + idx) || {}).value?.trim();
          if (source || summary || proUrl) {
            const { error: pErr } = await sb.from('pro_reviews').insert({
              book_id: bookId,
              user_id: currentUser.id,
              source:  source  || null,
              award:   award   || null,
              summary: summary || null,
              url:     proUrl  || null,
            });
            if (pErr) throw new Error('Pro review: ' + pErr.message);
          }
        }

        showToast('Book saved successfully!', 'success');
        clearForm();

      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }

    function clearForm() {
      ['b-title','b-author','b-isbn','b-cover',
       'r-rating','r-flagged','r-excerpts','r-report-url',
       'g-rating','g-summary','g-url'
      ].forEach(id => document.getElementById(id).value = '');
      document.getElementById('pro-reviews-list').innerHTML = '';
      proReviewCount = 0;
      addProReview();
    }

    let toastTimer;
    function showToast(msg, type) {
      const toast = document.getElementById('toast');
      document.getElementById('toast-msg').textContent = msg;
      toast.className = `toast ${type} show`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 4000);
    }

    init();
  </script>
</body>
</html>
