<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Reviews — The Whole Book</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111318;
      --surface: #1a1d24;
      --surface2: #20242d;
      --border: #2e3240;
      --accent: #e8b86d;
      --accent-glow: rgba(232,184,109,0.15);
      --text: #edeef2;
      --muted: #6b7080;
      --success: #6fcf97;
      --error: #eb5757;
      --pro: #7eb8f7;
      --rated: #b89df7;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); opacity: 0; transition: opacity 0.4s; }
    body.ready { opacity: 1; }

    nav {
      position: sticky; top: 0; z-index: 50;
      background: rgba(17,19,24,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 40px; display: flex; align-items: center; justify-content: space-between; height: 58px;
    }
    .nav-brand { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 700; color: var(--text); }
    .nav-brand span { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 16px; font-size: 13px; color: var(--muted); }
    .btn-ghost { background: none; border: 1px solid var(--border); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 6px 14px; border-radius: 2px; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    .layout { display: grid; grid-template-columns: 280px 1fr; min-height: calc(100vh - 58px); }

    /* Sidebar */
    .sidebar {
      border-right: 1px solid var(--border);
      background: var(--surface);
      display: flex; flex-direction: column;
      height: calc(100vh - 58px);
      position: sticky; top: 58px;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 20px 20px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-header h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px; font-weight: 700; margin-bottom: 10px;
    }

    .sidebar-search {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 8px 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    .sidebar-search:focus { border-color: var(--accent); }
    .sidebar-search::placeholder { color: var(--muted); }

    .sidebar-actions {
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .btn-new-book {
      width: 100%;
      background: var(--accent);
      color: #111318;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px; font-weight: 600;
      letter-spacing: 0.04em; text-transform: uppercase;
      border: none; padding: 9px; border-radius: 2px;
      cursor: pointer; transition: opacity 0.2s;
    }
    .btn-new-book:hover { opacity: 0.85; }

    .book-list { overflow-y: auto; flex: 1; padding: 8px 0; }

    .book-item {
      padding: 10px 20px;
      cursor: pointer;
      transition: background 0.15s;
      border-left: 2px solid transparent;
    }
    .book-item:hover { background: rgba(232,184,109,0.06); }
    .book-item.active { background: rgba(232,184,109,0.1); border-left-color: var(--accent); }

    .book-item-title { font-size: 13px; color: var(--text); line-height: 1.3; }
    .book-item-author { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .sidebar-empty { padding: 24px 20px; color: var(--muted); font-size: 12px; text-align: center; }

    /* Main content */
    .content { padding: 40px 40px 80px; overflow-y: auto; }

    .content-placeholder {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 60vh; color: var(--muted); text-align: center;
    }
    .content-placeholder .big { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 700; margin-bottom: 8px; color: var(--text); opacity: 0.3; }
    .content-placeholder p { font-size: 13px; }

    .page-header { margin-bottom: 36px; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
    .page-header h1 { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 700; letter-spacing: -0.01em; line-height: 1.1; }
    .page-header h1 span { color: var(--accent); }
    .page-header-meta { color: var(--muted); font-size: 12px; margin-top: 4px; }

    .btn-delete-book {
      background: none; border: 1px solid var(--border); color: var(--error);
      font-family: 'DM Sans', sans-serif; font-size: 11px; letter-spacing: 0.06em;
      text-transform: uppercase; padding: 8px 16px; border-radius: 2px; cursor: pointer;
      white-space: nowrap; transition: border-color 0.2s, background 0.2s; flex-shrink: 0;
    }
    .btn-delete-book:hover { border-color: var(--error); background: rgba(235,87,87,0.08); }

    /* Form sections - identical to reviewer.html */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .form-full { margin-bottom: 20px; }

    .section { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 28px 28px 24px; position: relative; }
    .section::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; border-radius: 4px 4px 0 0; }
    .section.book-section::before  { background: var(--accent); }
    .section.rated-section::before { background: var(--rated); }
    .section.pro-section::before   { background: var(--pro); }

    .section-label { font-size: 10px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    .section.book-section  .section-label { color: var(--accent); }
    .section.rated-section .section-label { color: var(--rated); }
    .section.pro-section   .section-label { color: var(--pro); }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .field { margin-bottom: 16px; }
    .field:last-child { margin-bottom: 0; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }

    label { display: block; font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
    .optional { font-size: 10px; font-weight: 400; letter-spacing: 0; text-transform: none; opacity: 0.7; margin-left: 3px; }

    input, textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 2px; padding: 10px 13px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    input:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    textarea { resize: vertical; min-height: 100px; line-height: 1.6; }

    /* Multi pro reviews */
    .pro-review-item { border: 1px solid var(--border); border-radius: 3px; padding: 20px; margin-bottom: 16px; position: relative; background: var(--surface2); animation: slideIn 0.25s ease both; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    .review-item-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .review-item-num { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--pro); font-weight: 500; }
    .btn-remove-review { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; line-height: 1; padding: 0 4px; transition: color 0.15s; }
    .btn-remove-review:hover { color: var(--error); }
    .btn-add-review { background: none; border: 1px dashed var(--border); color: var(--pro); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 0.06em; padding: 10px 20px; border-radius: 2px; cursor: pointer; width: 100%; transition: border-color 0.2s, background 0.2s; margin-top: 4px; }
    .btn-add-review:hover { border-color: var(--pro); background: rgba(126,184,247,0.05); }

    /* Submit row */
    .submit-row { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; padding-top: 28px; border-top: 1px solid var(--border); }
    .submit-hint { font-size: 12px; color: var(--muted); font-weight: 300; }

    .btn-submit { background: var(--accent); color: #111318; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; border: none; padding: 13px 36px; border-radius: 2px; cursor: pointer; transition: opacity 0.2s, transform 0.1s; display: flex; align-items: center; gap: 8px; }
    .btn-submit:hover { opacity: 0.88; }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

    .spinner { display: none; width: 13px; height: 13px; border: 2px solid rgba(17,19,24,0.3); border-top-color: #111318; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-submit.loading .spinner { display: block; }
    .btn-submit.loading .btn-label { display: none; }

    /* Toast */
    .toast { position: fixed; bottom: 32px; right: 32px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 14px 20px; font-size: 13px; display: flex; align-items: center; gap: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); transform: translateY(80px); opacity: 0; transition: transform 0.3s ease, opacity 0.3s ease; z-index: 200; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: var(--success); }
    .toast.error   { border-color: var(--error); }
    .toast-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .toast.success .toast-dot { background: var(--success); }
    .toast.error   .toast-dot { background: var(--error); }

    /* No rated report state */
    .no-record-btn {
      background: none; border: 1px dashed var(--border); color: var(--muted);
      font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 10px 20px;
      border-radius: 2px; cursor: pointer; width: 100%; margin-top: 8px;
      transition: border-color 0.2s, color 0.2s;
    }
    .no-record-btn:hover { border-color: var(--rated); color: var(--rated); }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { height: auto; position: static; }
      .content { padding: 24px 20px 60px; }
      nav { padding: 0 16px; }
      .form-grid, .field-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-brand">The Whole<span>Book</span> <span style="font-size:13px;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:300;margin-left:8px">Admin</span></div>
    <div class="nav-right">
      <a href="/admin.html" style="color:var(--muted);text-decoration:none;font-size:12px">← Dashboard</a>
      <span id="user-email-display"></span>
      <button class="btn-ghost" onclick="handleLogout()">Sign Out</button>
    </div>
  </nav>

  <div class="layout">
    <!-- Sidebar: book list -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Books</h2>
        <input class="sidebar-search" type="text" id="sidebarSearch" placeholder="Search books…" oninput="filterBooks(this.value)"/>
      </div>
      <div class="sidebar-actions">
        <button class="btn-new-book" onclick="loadNewBookForm()">+ Add New Book</button>
      </div>
      <div class="book-list" id="bookList">
        <div class="sidebar-empty">Loading…</div>
      </div>
    </aside>

    <!-- Main: form -->
    <div class="content" id="mainContent">
      <div class="content-placeholder">
        <div class="big">← Select a book</div>
        <p>Choose a book from the list to view and edit its details, or add a new one.</p>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">
    <div class="toast-dot"></div>
    <span id="toast-msg"></span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
     // ── CONFIG ── Replace with your actual Supabase project values ──────────
    const SUPABASE_URL = 'https://cqslqfztgtuuidgdkyyz.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_TBJdijzfEaYzBDBeqAy2CA_edJMKfgz';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser  = null;
    let allBooks     = [];
    let currentBook  = null;
    let proReviewCount = 0;
    let existingRatedId = null; // track if rated_report exists for current book

    // ── Auth ──────────────────────────────────────────────────────────────
    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = '/login.html'; return; }
      currentUser = session.user;
      document.getElementById('user-email-display').textContent = currentUser.email;
      document.body.classList.add('ready');
      await loadBookList();
    }

    async function handleLogout() {
      await sb.auth.signOut();
      window.location.href = '/login.html';
    }

    // ── Book list ─────────────────────────────────────────────────────────
    async function loadBookList() {
      const { data, error } = await sb.from('books').select('id, title, author').order('title');
      if (error) { document.getElementById('bookList').innerHTML = `<div class="sidebar-empty">${error.message}</div>`; return; }
      allBooks = data || [];
      renderBookList(allBooks);
    }

    function renderBookList(books) {
      const list = document.getElementById('bookList');
      if (!books.length) { list.innerHTML = '<div class="sidebar-empty">No books found.</div>'; return; }
      list.innerHTML = books.map(b => `
        <div class="book-item ${currentBook?.id === b.id ? 'active' : ''}" id="book-item-${b.id}" onclick="loadBook('${b.id}')">
          <div class="book-item-title">${b.title}</div>
          <div class="book-item-author">${b.author || ''}</div>
        </div>`).join('');
    }

    function filterBooks(query) {
      const filtered = allBooks.filter(b =>
        b.title.toLowerCase().includes(query.toLowerCase()) ||
        (b.author || '').toLowerCase().includes(query.toLowerCase())
      );
      renderBookList(filtered);
    }

    // ── Load book into form ───────────────────────────────────────────────
    async function loadBook(bookId) {
      // Highlight sidebar item
      document.querySelectorAll('.book-item').forEach(el => el.classList.remove('active'));
      const item = document.getElementById('book-item-' + bookId);
      if (item) item.classList.add('active');

      // Fetch all data
      const [bookRes, ratedRes, proRes] = await Promise.all([
        sb.from('books').select('*').eq('id', bookId).single(),
        sb.from('rated_reports').select('*').eq('book_id', bookId).maybeSingle(),
        sb.from('pro_reviews').select('*').eq('book_id', bookId).order('created_at')
      ]);

      if (bookRes.error) { showToast('Could not load book.', 'error'); return; }

      currentBook     = bookRes.data;
      existingRatedId = ratedRes.data?.id || null;

      renderForm(currentBook, ratedRes.data, proRes.data || []);
    }

    // ── Render form ───────────────────────────────────────────────────────
    function renderForm(book, rated, proReviews) {
      const content = document.getElementById('mainContent');
      content.innerHTML = `
        <div class="page-header">
          <div>
            <h1>${book.title} <span>·</span></h1>
            <div class="page-header-meta">${book.author || 'Unknown author'} ${book.isbn ? '· ISBN: ' + book.isbn : ''}</div>
          </div>
          <button class="btn-delete-book" onclick="deleteBook('${book.id}')">Delete Book</button>
        </div>

        <!-- Book Details + Rated Report -->
        <div class="form-grid">
          <div class="section book-section">
            <div class="section-label">Book Details</div>
            <div class="field"><label>Title</label><input type="text" id="b-title" value="${esc(book.title)}"/></div>
            <div class="field"><label>Author</label><input type="text" id="b-author" value="${esc(book.author||'')}"/></div>
            <div class="field"><label>ISBN</label><input type="text" id="b-isbn" value="${esc(book.isbn||'')}"/></div>
            <div class="field"><label>Cover Art URL <span class="optional">optional</span></label><input type="url" id="b-cover" value="${esc(book.cover_url||'')}"/></div>
          </div>

          <div class="section rated-section">
            <div class="section-label">Rated Books Report</div>
            ${rated ? `
            <div class="field"><label>Rating <span class="optional">1–5</span></label><input type="number" id="r-rating" min="1" max="5" value="${rated.rating||''}"/></div>
            <div class="field"><label>Flagged Categories</label><input type="text" id="r-flagged" value="${esc(rated.flagged_categories||'')}"/></div>
            <div class="field"><label>Excerpts</label><textarea id="r-excerpts">${esc(rated.excerpts||'')}</textarea></div>
            <div class="field"><label>Report URL</label><input type="url" id="r-report-url" value="${esc(rated.report_url||'')}"/></div>
            ` : `
            <p style="color:var(--muted);font-size:13px;margin-bottom:12px">No rated report yet.</p>
            <div class="field" style="display:none" id="rated-new-fields">
              <div class="field"><label>Rating <span class="optional">1–5</span></label><input type="number" id="r-rating" min="1" max="5" placeholder="e.g. 3"/></div>
              <div class="field"><label>Flagged Categories</label><input type="text" id="r-flagged" placeholder="e.g. Violence, Language"/></div>
              <div class="field"><label>Excerpts</label><textarea id="r-excerpts" placeholder="Notable excerpts…"></textarea></div>
              <div class="field"><label>Report URL</label><input type="url" id="r-report-url" placeholder="https://ratedbooks.org/…"/></div>
            </div>
            <button class="no-record-btn" id="addRatedBtn" onclick="showRatedFields()">+ Add Rated Report</button>
            `}
          </div>
        </div>

        <!-- Pro Reviews -->
        <div class="form-full">
          <div class="section pro-section">
            <div class="section-label">Professional Reviews</div>
            <div id="pro-reviews-list"></div>
            <button type="button" class="btn-add-review" onclick="addProReview()">+ Add Another Review</button>
          </div>
        </div>

        <div class="submit-row">
          <span class="submit-hint">Changes save to all sections at once.</span>
          <button class="btn-submit" id="submitBtn" onclick="handleSubmit()">
            <span class="btn-label">Save Changes</span>
            <div class="spinner"></div>
          </button>
        </div>`;

      // Populate pro reviews
      proReviewCount = 0;
      proReviews.forEach(r => addProReview(r));
      if (proReviews.length === 0) addProReview();
    }

    function showRatedFields() {
      document.getElementById('rated-new-fields').style.display = 'block';
      document.getElementById('addRatedBtn').style.display = 'none';
    }

    function esc(str) {
      return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── Pro review blocks ─────────────────────────────────────────────────
    function addProReview(data) {
      proReviewCount++;
      const idx = proReviewCount;
      const list = document.getElementById('pro-reviews-list');
      if (!list) return;
      const div = document.createElement('div');
      div.className = 'pro-review-item';
      div.id = 'pro-review-' + idx;
      if (data?.id) div.dataset.reviewId = data.id;
      div.innerHTML = `
        <div class="review-item-header">
          <span class="review-item-num">Review ${idx}</span>
          <button type="button" class="btn-remove-review" onclick="removeProReview(${idx})" title="Remove">×</button>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Source</label>
            <input type="text" id="p-source-${idx}" value="${esc(data?.source||'')}" placeholder="e.g. Publishers Weekly"/>
          </div>
          <div class="field">
            <label>Award <span class="optional">optional</span></label>
            <input type="text" id="p-award-${idx}" value="${esc(data?.award||'')}" placeholder="e.g. Newbery Medal"/>
          </div>
        </div>
        <div class="field">
          <label>Review Summary</label>
          <textarea id="p-summary-${idx}" style="min-height:110px" placeholder="Paste or summarize the professional review here…">${esc(data?.summary||'')}</textarea>
        </div>
        <div class="field">
          <label>Review URL <span class="optional">optional</span></label>
          <input type="url" id="p-url-${idx}" value="${esc(data?.url||'')}" placeholder="https://…"/>
        </div>`;
      list.appendChild(div);
    }

    function removeProReview(idx) {
      const el = document.getElementById('pro-review-' + idx);
      if (el) el.remove();
    }

    // ── New book form ─────────────────────────────────────────────────────
    function loadNewBookForm() {
      document.querySelectorAll('.book-item').forEach(el => el.classList.remove('active'));
      currentBook     = null;
      existingRatedId = null;

      const content = document.getElementById('mainContent');
      content.innerHTML = `
        <div class="page-header">
          <div><h1>Add a <span>New Book</span></h1><div class="page-header-meta">Fill in the details below and save.</div></div>
        </div>

        <div class="form-grid">
          <div class="section book-section">
            <div class="section-label">Book Details</div>
            <div class="field"><label>Title</label><input type="text" id="b-title" placeholder="Book title"/></div>
            <div class="field"><label>Author</label><input type="text" id="b-author" placeholder="Author name"/></div>
            <div class="field"><label>ISBN</label><input type="text" id="b-isbn" placeholder="978-0-000-00000-0"/></div>
            <div class="field"><label>Cover Art URL <span class="optional">optional</span></label><input type="url" id="b-cover" placeholder="https://…"/></div>
          </div>
          <div class="section rated-section">
            <div class="section-label">Rated Books Report</div>
            <div class="field"><label>Rating <span class="optional">1–5</span></label><input type="number" id="r-rating" min="1" max="5" placeholder="e.g. 3"/></div>
            <div class="field"><label>Flagged Categories</label><input type="text" id="r-flagged" placeholder="e.g. Violence, Language"/></div>
            <div class="field"><label>Excerpts</label><textarea id="r-excerpts" placeholder="Notable excerpts…"></textarea></div>
            <div class="field"><label>Report URL</label><input type="url" id="r-report-url" placeholder="https://ratedbooks.org/…"/></div>
          </div>
        </div>

        <div class="form-full">
          <div class="section pro-section">
            <div class="section-label">Professional Reviews</div>
            <div id="pro-reviews-list"></div>
            <button type="button" class="btn-add-review" onclick="addProReview()">+ Add Another Review</button>
          </div>
        </div>

        <div class="submit-row">
          <span class="submit-hint">All three records will be saved together.</span>
          <button class="btn-submit" id="submitBtn" onclick="handleSubmit()">
            <span class="btn-label">Save Book</span>
            <div class="spinner"></div>
          </button>
        </div>`;

      proReviewCount = 0;
      addProReview();
    }

    // ── Save ──────────────────────────────────────────────────────────────
    async function handleSubmit() {
      const title = document.getElementById('b-title')?.value.trim();
      if (!title) { showToast('Please enter a book title.', 'error'); return; }

      const btn = document.getElementById('submitBtn');
      btn.classList.add('loading'); btn.disabled = true;

      try {
        let bookId;

        if (currentBook) {
          // Update existing book
          const { error } = await sb.from('books').update({
            title,
            author:    document.getElementById('b-author')?.value.trim() || null,
            isbn:      document.getElementById('b-isbn')?.value.trim()   || null,
            cover_url: document.getElementById('b-cover')?.value.trim()  || null,
          }).eq('id', currentBook.id);
          if (error) throw new Error('Book: ' + error.message);
          bookId = currentBook.id;
        } else {
          // Insert new book
          const { data, error } = await sb.from('books').insert({
            title,
            author:    document.getElementById('b-author')?.value.trim() || null,
            isbn:      document.getElementById('b-isbn')?.value.trim()   || null,
            cover_url: document.getElementById('b-cover')?.value.trim()  || null,
          }).select('id').single();
          if (error) throw new Error('Book: ' + error.message);
          bookId = data.id;
        }

        // Rated report
        const ratingEl    = document.getElementById('r-rating');
        const flaggedEl   = document.getElementById('r-flagged');
        const excerptsEl  = document.getElementById('r-excerpts');
        const reportUrlEl = document.getElementById('r-report-url');

        if (ratingEl) {
          const ratedPayload = {
            book_id:            bookId,
            user_id:            currentUser.id,
            rating:             ratingEl.value ? parseInt(ratingEl.value) : null,
            flagged_categories: flaggedEl?.value.trim()   || null,
            excerpts:           excerptsEl?.value.trim()  || null,
            report_url:         reportUrlEl?.value.trim() || null,
          };

          if (existingRatedId) {
            const { error } = await sb.from('rated_reports').update(ratedPayload).eq('id', existingRatedId);
            if (error) throw new Error('Rated report: ' + error.message);
          } else if (ratingEl.value || flaggedEl?.value || excerptsEl?.value || reportUrlEl?.value) {
            const { error } = await sb.from('rated_reports').insert(ratedPayload);
            if (error) throw new Error('Rated report: ' + error.message);
          }
        }

        // Pro reviews — upsert each block
        const reviewItems = document.querySelectorAll('.pro-review-item');
        for (const item of reviewItems) {
          const idx     = item.id.replace('pro-review-', '');
          const source  = document.getElementById('p-source-'  + idx)?.value.trim();
          const award   = document.getElementById('p-award-'   + idx)?.value.trim();
          const summary = document.getElementById('p-summary-' + idx)?.value.trim();
          const proUrl  = document.getElementById('p-url-'     + idx)?.value.trim();
          const rid     = item.dataset.reviewId;

          if (source || summary || proUrl) {
            const payload = { book_id: bookId, user_id: currentUser.id, source: source||null, award: award||null, summary: summary||null, url: proUrl||null };
            if (rid) {
              const { error } = await sb.from('pro_reviews').update(payload).eq('id', rid);
              if (error) throw new Error('Pro review: ' + error.message);
            } else {
              const { error } = await sb.from('pro_reviews').insert(payload);
              if (error) throw new Error('Pro review: ' + error.message);
            }
          } else if (rid) {
            // Empty fields on existing review — delete it
            await sb.from('pro_reviews').delete().eq('id', rid);
          }
        }

        showToast(currentBook ? 'Changes saved!' : 'Book added!', 'success');
        await loadBookList();
        if (bookId) loadBook(bookId);

      } catch(err) {
        showToast(err.message, 'error');
      } finally {
        btn.classList.remove('loading'); btn.disabled = false;
      }
    }

    // ── Delete book ───────────────────────────────────────────────────────
    async function deleteBook(id) {
      if (!confirm('Delete this book and all its reviews? This cannot be undone.')) return;
      // Delete related records first
      await sb.from('pro_reviews').delete().eq('book_id', id);
      await sb.from('rated_reports').delete().eq('book_id', id);
      const { error } = await sb.from('books').delete().eq('id', id);
      if (error) { showToast(error.message, 'error'); return; }
      showToast('Book deleted.', 'success');
      currentBook = null;
      document.getElementById('mainContent').innerHTML = `
        <div class="content-placeholder">
          <div class="big">← Select a book</div>
          <p>Choose a book from the list to view and edit its details, or add a new one.</p>
        </div>`;
      await loadBookList();
    }

    // ── Toast ─────────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg, type) {
      const toast = document.getElementById('toast');
      document.getElementById('toast-msg').textContent = msg;
      toast.className = `toast ${type} show`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 4000);
    }

    init();
  </script>
</body>
</html>
