<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #2a2a3a;
      --accent: #7c6aff;
      --accent-glow: rgba(124,106,255,0.25);
      --text: #e8e8f0;
      --muted: #666680;
      --error: #ff6b6b;
      --success: #6bffb8;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      color: var(--text);
      overflow: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,106,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,106,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridShift 20s linear infinite;
      pointer-events: none;
    }

    @keyframes gridShift {
      0% { transform: translate(0, 0); }
      100% { transform: translate(40px, 40px); }
    }

    /* Radial glow */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(124,106,255,0.12) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%,-50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%,-50%) scale(1.1); }
    }

    .card {
      position: relative;
      z-index: 10;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 0 60px rgba(124,106,255,0.1), 0 20px 60px rgba(0,0,0,0.6);
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-block;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 3px 8px;
      border-radius: 2px;
      margin-bottom: 20px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 36px;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    input::placeholder { color: var(--muted); }

    .btn {
      width: 100%;
      margin-top: 28px;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn:hover { opacity: 0.9; box-shadow: 0 0 20px var(--accent-glow); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn .spinner {
      display: none;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn.loading .btn-text { display: none; }
    .btn.loading .spinner { display: block; }

    .message {
      margin-top: 16px;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
      transition: all 0.3s;
    }
    .message.error { color: var(--error); }
    .message.success { color: var(--success); }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 28px 0 20px;
    }

    .footer-link {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }

    .footer-link a {
      color: var(--accent);
      text-decoration: none;
    }

    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Admin Access</div>
    <h1>Sign In</h1>
    <p class="subtitle">Enter your credentials to continue</p>

    <!-- Sign in view -->
    <div id="view-signin">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn" id="loginBtn" onclick="handleLogin()">
        <span class="btn-text">Sign In</span>
        <div class="spinner"></div>
      </button>
      <div class="message" id="msg"></div>
      <hr class="divider"/>
      <p class="footer-link">
        Forgot password? <a href="#" onclick="handleReset(event)">Reset via email</a>
      </p>
    </div>

    <!-- Set password view (invite / password reset) -->
    <div id="view-setpassword" style="display:none">
      <div class="field">
        <label for="new-password">Choose a Password</label>
        <input type="password" id="new-password" placeholder="Min. 8 characters" autocomplete="new-password"/>
      </div>
      <div class="field">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Repeat password" autocomplete="new-password"/>
      </div>
      <button class="btn" id="setBtn" onclick="handleSetPassword()">
        <span class="btn-text">Set Password & Sign In</span>
        <div class="spinner"></div>
      </button>
      <div class="message" id="msg2"></div>
    </div>
  </div>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
   // ── CONFIG ── Replace with your actual Supabase project values ──────────
    const SUPABASE_URL = 'https://cqslqfztgtuuidgdkyyz.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_TBJdijzfEaYzBDBeqAy2CA_edJMKfgz';
    // ────────────────────────────────────────────────────────────────────────

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ── Role-based redirect ───────────────────────────────────────────────
    async function redirectByRole() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) return;
  const { data: profile, error } = await sb
    .from('profiles')
    .select('role')
    .eq('id', session.user.id)
    .single();
  console.log('profile:', profile, 'error:', error);
  const role = profile?.role || 'reviewer';
  window.location.href = role === 'admin' ? '/admin.html' : '/reviewer.html';
}

    // ── Detect invite / password-reset token in URL hash ──────────────────
    function getHashParams() {
      return Object.fromEntries(
        window.location.hash.slice(1).split('&').map(p => p.split('='))
      );
    }

    async function init() {
      const hash = getHashParams();
      const type = hash.type;

      if ((type === 'invite' || type === 'recovery') && hash.access_token) {
        const { error } = await sb.auth.setSession({
          access_token: hash.access_token,
          refresh_token: hash.refresh_token || ''
        });
        if (error) { setMsg(error.message, 'error'); return; }
        document.getElementById('view-signin').style.display = 'none';
        document.getElementById('view-setpassword').style.display = 'block';
        document.querySelector('h1').textContent = type === 'invite' ? 'Set Password' : 'New Password';
        document.querySelector('.subtitle').textContent = 'Choose a password to activate your account.';
        history.replaceState(null, '', window.location.pathname);
        return;
      }

      // Already logged in — redirect by role
      const { data } = await sb.auth.getSession();
      if (data.session) redirectByRole();
    }

    init();

    // ── Sign in ───────────────────────────────────────────────────────────
    function setMsg(text, type) {
      const msg = document.getElementById('msg');
      msg.textContent = text;
      msg.className = 'message ' + type;
    }

    function setMsg2(text, type) {
      const msg = document.getElementById('msg2');
      msg.textContent = text;
      msg.className = 'message ' + type;
    }

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) return setMsg('Please fill in all fields.', 'error');

      const btn = document.getElementById('loginBtn');
      btn.classList.add('loading'); btn.disabled = true;
      setMsg('', '');

      const { error } = await sb.auth.signInWithPassword({ email, password });
      btn.classList.remove('loading'); btn.disabled = false;

      if (error) {
        setMsg(error.message, 'error');
      } else {
        setMsg('Access granted — redirecting…', 'success');
        setTimeout(() => redirectByRole(), 800);
      }
    }

    // ── Set password (invite / recovery) ─────────────────────────────────
    async function handleSetPassword() {
      const pw  = document.getElementById('new-password').value;
      const pw2 = document.getElementById('confirm-password').value;
      if (!pw || pw.length < 8) return setMsg2('Password must be at least 8 characters.', 'error');
      if (pw !== pw2) return setMsg2('Passwords do not match.', 'error');

      const btn = document.getElementById('setBtn');
      btn.classList.add('loading'); btn.disabled = true;

      const { error } = await sb.auth.updateUser({ password: pw });
      btn.classList.remove('loading'); btn.disabled = false;

      if (error) {
        setMsg2(error.message, 'error');
      } else {
        setMsg2('Password set! Redirecting…', 'success');
        setTimeout(() => redirectByRole(), 800);
      }
    }

    // ── Password reset email ──────────────────────────────────────────────
    async function handleReset(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email) return setMsg('Enter your email above first.', 'error');

      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/login.html'
      });
      if (error) setMsg(error.message, 'error');
      else setMsg('Password reset email sent!', 'success');
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const spView = document.getElementById('view-setpassword');
        if (spView.style.display !== 'none') handleSetPassword();
        else handleLogin();
      }
    });
  </script>
</body>
</html>
