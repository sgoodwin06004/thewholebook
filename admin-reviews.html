<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Reviews — The Whole Book Admin</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #171717;
      --surface2: #1f1f1f;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #888;
      --accent: #c0392b;
      --accent-soft: rgba(192,57,43,0.12);
      --green: #27ae60;
      --green-soft: rgba(39,174,96,0.12);
      --yellow: #f39c12;
      --yellow-soft: rgba(243,156,18,0.10);
      --radius: 6px;
      --font: 'Georgia', serif;
      --mono: 'Courier New', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
    }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 52px;
    }
    .topbar-brand {
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: bold;
      font-family: var(--mono);
      text-decoration: none;
    }
    .topbar-nav { display: flex; gap: 0; margin-left: auto; }
    .topbar-nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0 1rem;
      height: 52px;
      display: flex;
      align-items: center;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .topbar-nav a:hover { color: var(--text); }
    .topbar-nav a.active { color: var(--text); border-bottom-color: var(--accent); }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
    }

    .page-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .page-title {
      font-size: 1.6rem;
      font-weight: normal;
      letter-spacing: -0.02em;
    }
    .page-title span { color: var(--accent); }

    .stats-bar {
      display: flex;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 2rem;
    }
    .stat {
      flex: 1;
      background: var(--surface);
      padding: 1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .stat-value {
      font-size: 1.75rem;
      font-family: var(--mono);
      color: var(--text);
      line-height: 1;
    }
    .stat-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .filters {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.4rem 0.9rem;
      border-radius: 99px;
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
      font-family: var(--mono);
    }
    .filter-btn:hover { color: var(--text); border-color: #444; }
    .filter-btn.active { background: var(--accent-soft); border-color: var(--accent); color: var(--text); }

    .search-box {
      margin-left: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.4rem 0.9rem;
      border-radius: var(--radius);
      font-size: 0.85rem;
      font-family: var(--font);
      width: 220px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-box:focus { border-color: #555; }
    .search-box::placeholder { color: var(--muted); }

    .book-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .book-row {
      background: var(--surface);
      display: grid;
      grid-template-columns: 44px 1fr auto auto;
      align-items: center;
      gap: 0;
      padding: 0;
      transition: background 0.1s;
    }
    .book-row:hover { background: var(--surface2); }

    .book-cover-cell {
      padding: 0.6rem 0 0.6rem 0.75rem;
      display: flex;
      align-items: center;
    }
    .book-cover-thumb {
      width: 32px;
      height: 44px;
      object-fit: cover;
      border-radius: 2px;
      background: var(--surface2);
      display: block;
    }
    .cover-placeholder {
      width: 32px;
      height: 44px;
      background: var(--surface2);
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      color: var(--border);
    }

    .book-info-cell { padding: 0.75rem 1rem; }
    .book-title-text {
      font-size: 0.95rem;
      color: var(--text);
      margin-bottom: 0.15rem;
      line-height: 1.3;
    }
    .book-author-text {
      font-size: 0.78rem;
      color: var(--muted);
      font-style: italic;
    }

    .review-badge-cell {
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
    }
    .review-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.3rem 0.7rem;
      border-radius: 99px;
      font-size: 0.75rem;
      font-family: var(--mono);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .badge-none {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .badge-has {
      background: var(--green-soft);
      color: var(--green);
      border: 1px solid rgba(39,174,96,0.25);
    }
    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    .actions-cell {
      padding: 0.75rem 0.75rem 0.75rem 0;
      display: flex;
      gap: 0.5rem;
    }
    .btn-edit {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.35rem 0.8rem;
      border-radius: var(--radius);
      font-size: 0.78rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: var(--mono);
      transition: all 0.15s;
      white-space: nowrap;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }
    .btn-edit:hover {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--text);
    }
    .btn-edit.primary {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--text);
    }

    .loading-state, .empty-state {
      padding: 4rem 2rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      background: var(--surface);
    }
    .loading-dots span {
      display: inline-block;
      animation: blink 1.2s infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }

    .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .empty-title { font-size: 1rem; color: var(--text); margin-bottom: 0.4rem; }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 1rem;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 680px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      flex-shrink: 0;
    }
    .modal-book-title {
      font-size: 1rem;
      color: var(--text);
      margin-bottom: 0.2rem;
    }
    .modal-book-author {
      font-size: 0.8rem;
      color: var(--muted);
      font-style: italic;
    }
    .modal-close {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 28px;
      height: 28px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .modal-close:hover { border-color: #555; color: var(--text); }

    .modal-body {
      padding: 1.5rem;
      overflow-y: auto;
      flex: 1;
    }

    .existing-reviews { margin-bottom: 1.75rem; }
    .existing-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }
    .review-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.9rem 1rem;
      margin-bottom: 0.6rem;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
    }
    .review-item-info { flex: 1; min-width: 0; }
    .review-source {
      font-size: 0.85rem;
      color: var(--text);
      margin-bottom: 0.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .review-award {
      font-size: 0.7rem;
      background: var(--yellow-soft);
      color: var(--yellow);
      border: 1px solid rgba(243,156,18,0.25);
      padding: 0.1rem 0.45rem;
      border-radius: 99px;
      font-family: var(--mono);
      letter-spacing: 0.04em;
    }
    .review-summary {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .review-date {
      font-size: 0.7rem;
      color: var(--muted);
      font-family: var(--mono);
      margin-top: 0.4rem;
      line-height: 1.6;
    }
    .review-date span {
      color: var(--text);
    }
    .review-item-actions {
      display: flex;
      gap: 0.4rem;
      flex-shrink: 0;
      padding-top: 0.1rem;
    }
    .btn-sm {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.25rem 0.6rem;
      border-radius: var(--radius);
      font-size: 0.72rem;
      font-family: var(--mono);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-sm:hover { color: var(--text); border-color: #555; }
    .btn-sm.danger:hover { color: var(--accent); border-color: var(--accent); }

    .form-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0 1.25rem;
    }
    .form-section-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 1rem;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }
    .form-grid.full { grid-template-columns: 1fr; }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .form-group.span2 { grid-column: span 2; }
    .form-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-family: var(--mono);
    }
    .form-input, .form-textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 0.75rem;
      border-radius: var(--radius);
      font-size: 0.85rem;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }
    .form-input:focus, .form-textarea:focus { border-color: #555; }
    .form-textarea { resize: vertical; min-height: 80px; }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
      margin-top: 1.25rem;
    }
    .btn-cancel {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.5rem 1.1rem;
      border-radius: var(--radius);
      font-size: 0.8rem;
      font-family: var(--mono);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-cancel:hover { color: var(--text); border-color: #555; }
    .btn-save {
      background: var(--accent);
      border: 1px solid var(--accent);
      color: #fff;
      padding: 0.5rem 1.4rem;
      border-radius: var(--radius);
      font-size: 0.8rem;
      font-family: var(--mono);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-save:hover { opacity: 0.85; }
    .btn-save:disabled { opacity: 0.45; cursor: not-allowed; }

    .form-status {
      font-size: 0.8rem;
      text-align: right;
      margin-top: 0.5rem;
      min-height: 1.2em;
    }
    .form-status.ok { color: var(--green); }
    .form-status.err { color: var(--accent); }

    .list-header {
      display: grid;
      grid-template-columns: 44px 1fr auto auto;
      padding: 0.5rem 0;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .list-header span {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      font-family: var(--mono);
      padding: 0 0.75rem;
    }
    .list-header span:first-child { padding-left: 0.75rem; }

    .filter-sep {
      color: var(--border);
      font-size: 1rem;
      padding: 0 0.1rem;
      user-select: none;
    }
    .book-date-text {
      font-size: 0.72rem;
      color: var(--muted);
      font-family: var(--mono);
      margin-top: 0.2rem;
      opacity: 0.8;
    }

    /* ── DATE RANGE FILTER ── */
    .date-range-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    .dr-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-family: var(--mono);
    }
    .date-input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.4rem 0.7rem;
      border-radius: var(--radius);
      font-size: 0.82rem;
      font-family: var(--mono);
      outline: none;
      transition: border-color 0.15s;
      color-scheme: dark;
    }
    .date-input:focus { border-color: #555; }
    .dr-sep {
      color: var(--muted);
      font-size: 0.78rem;
      font-family: var(--mono);
    }

    /* ── DATE RANGE RESULTS PANEL ── */
    .dr-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 1.5rem;
    }
    .dr-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
      gap: 1rem;
      flex-wrap: wrap;
    }
    .dr-count {
      font-size: 0.82rem;
      color: var(--text);
      font-family: var(--mono);
    }
    .dr-selected-count { color: var(--accent); }
    .dr-controls {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .dr-select-all-label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      font-family: var(--mono);
      cursor: pointer;
      user-select: none;
    }
    .dr-select-all-label input { cursor: pointer; accent-color: var(--accent); }
    .btn-bulk-pub, .btn-bulk-unpub {
      background: none;
      border: 1px solid;
      padding: 0.3rem 0.7rem;
      border-radius: var(--radius);
      font-size: 0.72rem;
      font-family: var(--mono);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-bulk-pub { color: var(--green); border-color: rgba(39,174,96,0.3); }
    .btn-bulk-pub:hover { background: var(--green-soft); }
    .btn-bulk-unpub { color: var(--muted); border-color: var(--border); }
    .btn-bulk-unpub:hover { color: var(--text); border-color: #555; }

    .dr-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
      background: var(--border);
    }
    .dr-review-item {
      background: var(--surface);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.7rem 1rem;
      cursor: pointer;
      transition: background 0.1s;
    }
    .dr-review-item:hover { background: var(--surface2); }
    .dr-review-item.dr-selected { background: rgba(192,57,43,0.06); }
    .dr-check { cursor: pointer; accent-color: var(--accent); flex-shrink: 0; }
    .dr-review-info { flex: 1; min-width: 0; }
    .dr-review-book {
      font-size: 0.88rem;
      color: var(--text);
      margin-bottom: 0.1rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .dr-review-source {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 0.15rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    .dr-review-meta {
      font-size: 0.7rem;
      color: var(--muted);
      font-family: var(--mono);
    }
    .dr-pub { color: var(--green); }
    .dr-unpub { color: var(--muted); opacity: 0.7; }
    .btn-dr-clear {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.4rem 0.9rem;
      border-radius: 99px;
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: var(--mono);
      transition: all 0.15s;
    }
    .btn-dr-clear:hover { color: var(--text); border-color: #444; }
    .btn-dr-view {
      flex-shrink: 0;
      background: var(--surface2);
      border: 1px solid #444;
      color: var(--text);
      padding: 0.3rem 0.75rem;
      border-radius: var(--radius);
      font-size: 0.75rem;
      font-family: var(--mono);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-dr-view:hover { background: var(--accent-soft); border-color: var(--accent); }
    .dr-empty {
      padding: 2.5rem 2rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <nav class="topbar">
    <a href="admin.html" class="topbar-brand">The Whole Book ↗</a>
    <div class="topbar-nav">
      <a href="admin.html">Books</a>
      <a href="admin-reviews.html" class="active">Reviews</a>
      <a href="reviewer.html">Reviewer</a>
    </div>
  </nav>

  <div class="page">
    <div class="page-header">
      <h1 class="page-title">Manage <span>Reviews</span></h1>
    </div>

    <div class="stats-bar" id="statsBar">
      <div class="stat">
        <div class="stat-value" id="statBooks">—</div>
        <div class="stat-label">Total Books</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statWithReviews">—</div>
        <div class="stat-label">Have Reviews</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statTotalReviews">—</div>
        <div class="stat-label">Total Reviews</div>
      </div>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All Books</button>
      <button class="filter-btn" data-filter="has">Has Reviews</button>
      <span class="filter-sep">|</span>
      <button class="filter-btn sort-btn active" data-sort="alpha">A–Z</button>
      <button class="filter-btn sort-btn" data-sort="added">Recently Added</button>
      <button class="filter-btn sort-btn" data-sort="updated">Recently Updated</button>
      <input type="text" class="search-box" id="searchBox" placeholder="Search title or author…" />
    </div>

    <div class="date-range-row">
      <span class="dr-label">Date Range</span>
      <input type="date" class="date-input" id="dateFrom" title="From date" />
      <span class="dr-sep">to</span>
      <input type="date" class="date-input" id="dateTo" title="To date" />
      <button class="btn-dr-clear" id="btnClearDates">Clear</button>
    </div>

    <div id="dateRangeResults"></div>

    <div class="book-list" id="bookList">
      <div class="loading-state">
        Loading books<span class="loading-dots"><span>.</span><span>.</span><span>.</span></span>
      </div>
    </div>
  </div>

  <!-- ── REVIEW MODAL ── -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <div>
          <div class="modal-book-title" id="modalBookTitle">—</div>
          <div class="modal-book-author" id="modalBookAuthor">—</div>
        </div>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body">
        <div class="existing-reviews" id="existingReviews"></div>

        <hr class="form-divider" />
        <div class="form-section-label" id="formSectionLabel">Add New Review</div>

        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Source</label>
            <input type="text" class="form-input" id="fSource" placeholder="e.g. Kirkus Reviews" />
          </div>
          <div class="form-group">
            <label class="form-label">Award (optional)</label>
            <input type="text" class="form-input" id="fAward" placeholder="e.g. ALA Notable" />
          </div>
          <div class="form-group span2">
            <label class="form-label">Summary</label>
            <textarea class="form-textarea" id="fSummary" rows="3" placeholder="Paraphrased review summary…"></textarea>
          </div>
          <div class="form-group span2">
            <label class="form-label">URL</label>
            <input type="url" class="form-input" id="fUrl" placeholder="https://…" />
          </div>
        </div>

        <div class="form-actions">
          <button class="btn-cancel" id="btnClearForm">Clear</button>
          <button class="btn-save" id="btnSaveReview">Save Review</button>
        </div>
        <div class="form-status" id="formStatus"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://cqslqfztgtuuidgdkyyz.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_TBJdijzfEaYzBDBeqAy2CA_edJMKfgz';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    const headers = {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    };

    async function sbFetch(path, opts = {}) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, { headers, ...opts });
      if (!res.ok) {
        const err = await res.text();
        throw new Error(err);
      }
      return res.json();
    }

    // ── STATE ──
    let allBooks = [];
    let allReviews = [];
    let userMap = {};
    let activeFilter = 'all';
    let sortMode = 'alpha';
    let searchQuery = '';
    let currentBookId = null;
    let editingReviewId = null;
    let dateFrom = '';
    let dateTo = '';
    let selectedReviewIds = new Set();

    // ── LOAD ──
    async function loadAll() {
      try {
        const [books, reviews] = await Promise.all([
          sbFetch('books?select=id,title,author,cover_url,publication_year&order=title.asc'),
          sbFetch('pro_reviews?select=*&order=created_at.asc')
        ]);
        allBooks = books;
        allBooks.sort((a,b) => sortKey(a.title).localeCompare(sortKey(b.title)));
        allReviews = reviews;
        updateStats();
        renderList();
      } catch (e) {
        document.getElementById('bookList').innerHTML =
          `<div class="loading-state">⚠ Failed to load: ${e.message}</div>`;
      }
    }

    function reviewsForBook(bookId) {
      return allReviews.filter(r => r.book_id === bookId);
    }

    // ── STATS ──
    function updateStats() {
      const withReviews = allBooks.filter(b => reviewsForBook(b.id).length > 0).length;
      document.getElementById('statBooks').textContent = allBooks.length;
      document.getElementById('statWithReviews').textContent = withReviews;
      document.getElementById('statTotalReviews').textContent = allReviews.length;
    }

    function latestReviewDate(bookId, mode) {
      const revs = reviewsForBook(bookId);
      if (!revs.length) return null;
      const dates = mode === 'updated'
        ? revs.map(r => r.updated_at && r.updated_at !== r.created_at ? r.updated_at : null).filter(Boolean)
        : revs.map(r => r.created_at).filter(Boolean);
      if (!dates.length) return null;
      return dates.reduce((max, d) => d > max ? d : max);
    }

    // ── RENDER LIST ──
    function renderList() {
      const q = searchQuery.toLowerCase();
      const filtered = allBooks.filter(b => {
        const matchSearch = !q || b.title.toLowerCase().includes(q) || (b.author || '').toLowerCase().includes(q);
        const revCount = reviewsForBook(b.id).length;
        const matchFilter = activeFilter === 'all' ||
          (activeFilter === 'has' && revCount > 0);
        return matchSearch && matchFilter;
      });

      if (sortMode === 'added' || sortMode === 'updated') {
        filtered.sort((a, b) => {
          const da = latestReviewDate(a.id, sortMode);
          const db = latestReviewDate(b.id, sortMode);
          if (!da && !db) return sortKey(a.title).localeCompare(sortKey(b.title));
          if (!da) return 1;
          if (!db) return -1;
          return db.localeCompare(da); // desc
        });
      }

      const list = document.getElementById('bookList');

      if (filtered.length === 0) {
        list.innerHTML = `<div class="empty-state">
          <div class="empty-icon">📚</div>
          <div class="empty-title">No books found</div>
          <div>Try changing your filter or search</div>
        </div>`;
        return;
      }

      list.innerHTML = filtered.map(book => {
        const revs = reviewsForBook(book.id);
        const count = revs.length;
        const badgeClass = count > 0 ? 'badge-has' : 'badge-none';
        const badgeText = count > 0 ? `${count} review${count !== 1 ? 's' : ''}` : 'No reviews';
        const cover = book.cover_url
          ? `<img class="book-cover-thumb" src="${escHtml(book.cover_url)}" alt="" loading="lazy" />`
          : `<div class="cover-placeholder">📖</div>`;

        const latestDate = (sortMode !== 'alpha') ? latestReviewDate(book.id, sortMode) : null;
        const dateLabel = latestDate
          ? `<div class="book-date-text">${sortMode === 'added' ? 'Added' : 'Updated'} ${new Date(latestDate).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' })}</div>`
          : '';

        return `<div class="book-row" data-id="${escHtml(book.id)}">
          <div class="book-cover-cell">${cover}</div>
          <div class="book-info-cell">
            <div class="book-title-text">${escHtml(book.title)}</div>
            <div class="book-author-text">${escHtml(book.author || '')}</div>
            ${dateLabel}
          </div>
          <div class="review-badge-cell">
            <span class="review-badge ${badgeClass}">
              <span class="badge-dot"></span>${badgeText}
            </span>
          </div>
          <div class="actions-cell">
            <button class="btn-edit${count === 0 ? ' primary' : ''}" onclick="openModal('${escHtml(book.id)}')">
              ${count === 0 ? '+ Add Review' : 'Edit Reviews'}
            </button>
          </div>
        </div>`;
      }).join('');
    }

    // ── MODAL ──
    function openModal(bookId) {
      currentBookId = bookId;
      editingReviewId = null;
      const book = allBooks.find(b => b.id === bookId);
      document.getElementById('modalBookTitle').textContent = book.title;
      document.getElementById('modalBookAuthor').textContent = [book.author, book.publication_year].filter(Boolean).join(' · ');
      renderExistingReviews();
      clearForm();
      document.getElementById('modalOverlay').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
      currentBookId = null;
      editingReviewId = null;
    }

    function renderExistingReviews() {
      const revs = reviewsForBook(currentBookId);
      const container = document.getElementById('existingReviews');

      if (revs.length === 0) {
        container.innerHTML = `<div class="existing-label">No reviews yet for this book</div>`;
        return;
      }

      container.innerHTML = `<div class="existing-label">${revs.length} Review${revs.length !== 1 ? 's' : ''}</div>` +
        revs.map(r => `
          <div class="review-item" id="ri-${r.id}">
            <div class="review-item-info">
              <div class="review-source">
                ${escHtml(r.source || 'Unknown source')}
                ${r.award ? `<span class="review-award">★ ${escHtml(r.award)}</span>` : ''}
              </div>
              <div class="review-summary">${escHtml(r.summary || '')}</div>
              <div class="review-date">
                ${r.user_id && userMap[r.user_id] ? `<span>${escHtml(userMap[r.user_id])}</span> · ` : ''}
                Added ${r.created_at ? new Date(r.created_at).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }) : '—'}
                ${r.updated_at && r.updated_at !== r.created_at ? ` · Updated ${new Date(r.updated_at).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' })}` : ''}
              </div>
            </div>
            <div class="review-item-actions">
              <button class="btn-sm" onclick="editReview('${r.id}')">Edit</button>
              <button class="btn-sm danger" onclick="deleteReview('${r.id}')">Del</button>
            </div>
          </div>
        `).join('');
    }

    function editReview(reviewId) {
      const r = allReviews.find(x => x.id === reviewId);
      if (!r) return;
      editingReviewId = reviewId;
      document.getElementById('fSource').value = r.source || '';
      document.getElementById('fAward').value = r.award || '';
      document.getElementById('fSummary').value = r.summary || '';
      document.getElementById('fUrl').value = r.url || '';
      document.getElementById('formSectionLabel').textContent = 'Edit Review';
      document.getElementById('btnSaveReview').textContent = 'Update Review';
      setStatus('');
    }

    async function deleteReview(reviewId) {
      if (!confirm('Delete this review?')) return;
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/pro_reviews?id=eq.${reviewId}`, {
          method: 'DELETE', headers
        });
        if (!res.ok) {
          const err = await res.text();
          throw new Error(err);
        }
        allReviews = allReviews.filter(r => r.id !== reviewId);
        updateStats();
        renderExistingReviews();
        renderList();
        setStatus('Deleted.', 'ok');
      } catch (e) {
        setStatus('Delete failed: ' + e.message, 'err');
      }
    }

    function clearForm() {
      editingReviewId = null;
      ['fSource','fAward','fSummary','fUrl'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('formSectionLabel').textContent = 'Add New Review';
      document.getElementById('btnSaveReview').textContent = 'Save Review';
      setStatus('');
    }

    async function saveReview() {
      const source = document.getElementById('fSource').value.trim();
      const summary = document.getElementById('fSummary').value.trim();
      if (!source) { setStatus('Source is required.', 'err'); return; }

      const btn = document.getElementById('btnSaveReview');
      btn.disabled = true;
      setStatus('Saving…');

      const payload = {
        book_id: currentBookId,
        source,
        summary: summary || null,
        award: document.getElementById('fAward').value.trim() || null,
        url: document.getElementById('fUrl').value.trim() || null
      };

      try {
        if (editingReviewId) {
          const [updated] = await sbFetch(`pro_reviews?id=eq.${editingReviewId}`, {
            method: 'PATCH',
            body: JSON.stringify(payload)
          });
          allReviews = allReviews.map(r => r.id === editingReviewId ? updated : r);
          setStatus('Updated!', 'ok');
        } else {
          const [created] = await sbFetch('pro_reviews', {
            method: 'POST',
            body: JSON.stringify(payload)
          });
          allReviews.push(created);
          setStatus('Saved!', 'ok');
        }
        clearForm();
        updateStats();
        renderExistingReviews();
        renderList();
      } catch (e) {
        setStatus('Save failed: ' + e.message, 'err');
      } finally {
        btn.disabled = false;
      }
    }

    function setStatus(msg, type = '') {
      const el = document.getElementById('formStatus');
      el.textContent = msg;
      el.className = 'form-status' + (type ? ' ' + type : '');
    }

    function sortKey(title) { return (title||'').replace(/^(the|a|an)\s+/i,'').toLowerCase(); }

    function escHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── DATE RANGE ──
    function reviewsInRange() {
      if (!dateFrom && !dateTo) return [];
      return allReviews.filter(r => {
        const d = (r.created_at || '').slice(0, 10);
        if (dateFrom && d < dateFrom) return false;
        if (dateTo && d > dateTo) return false;
        return true;
      });
    }

    function applyDateRange() {
      dateFrom = document.getElementById('dateFrom').value;
      dateTo = document.getElementById('dateTo').value;
      selectedReviewIds.clear();
      renderDateRangeResults();
    }

    function clearDateRange() {
      dateFrom = '';
      dateTo = '';
      document.getElementById('dateFrom').value = '';
      document.getElementById('dateTo').value = '';
      selectedReviewIds.clear();
      document.getElementById('dateRangeResults').innerHTML = '';
    }

    function renderDateRangeResults() {
      const panel = document.getElementById('dateRangeResults');
      if (!dateFrom && !dateTo) {
        panel.innerHTML = '';
        return;
      }

      const matched = reviewsInRange();
      const allSelected = matched.length > 0 && matched.every(function(r) { return selectedReviewIds.has(r.id); });
      const anySelected = selectedReviewIds.size > 0;

      const fmt = { month: 'short', day: 'numeric', year: 'numeric' };
      const fromLabel = dateFrom ? new Date(dateFrom + 'T00:00:00').toLocaleDateString('en-US', fmt) : '';
      const toLabel   = dateTo   ? new Date(dateTo   + 'T00:00:00').toLocaleDateString('en-US', fmt) : '';
      const rangeText = (fromLabel && toLabel) ? fromLabel + ' – ' + toLabel : (fromLabel || toLabel);

      const countText = matched.length + ' review' + (matched.length !== 1 ? 's' : '') + ' · ' + rangeText;
      const selectedText = anySelected ? ' · <span class="dr-selected-count">' + selectedReviewIds.size + ' selected</span>' : '';

      const bulkBtns = anySelected
        ? '<button class="btn-bulk-pub" onclick="bulkPublish(true)">Publish (' + selectedReviewIds.size + ')</button>'
          + '<button class="btn-bulk-unpub" onclick="bulkPublish(false)">Unpublish (' + selectedReviewIds.size + ')</button>'
        : '';

      let rowsHtml = '';
      if (matched.length === 0) {
        rowsHtml = '<div class="dr-empty">No reviews found in this date range.</div>';
      } else {
        const rows = matched.map(function(r) {
          const book = allBooks.find(function(b) { return b.id === r.book_id; });
          const bookTitle = book ? book.title : 'Unknown Book';
          const dateStr = r.created_at
            ? new Date(r.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' })
            : '—';
          const checked = selectedReviewIds.has(r.id);
          const selClass = checked ? ' dr-selected' : '';
          const pubStr = r.published
            ? '<span class="dr-pub">Published</span>'
            : '<span class="dr-unpub">Hidden</span>';
          const awardStr = r.award
            ? ' <span class="review-award">★ ' + escHtml(r.award) + '</span>'
            : '';
          return '<div class="dr-review-item' + selClass + '" onclick="drRowClick(\'' + escHtml(r.id) + '\')">'
            + '<input type="checkbox" class="dr-check" id="chk-' + escHtml(r.id) + '" ' + (checked ? 'checked ' : '') + 'onchange="toggleReviewCheck(\'' + escHtml(r.id) + '\', this.checked)" onclick="event.stopPropagation()" />'
            + '<div class="dr-review-info">'
            + '<div class="dr-review-book">' + escHtml(bookTitle) + '</div>'
            + '<div class="dr-review-source">' + escHtml(r.source || 'Unknown source') + awardStr + '</div>'
            + '<div class="dr-review-meta">' + dateStr + ' · ' + pubStr + '</div>'
            + '</div>'
            + '<button class="btn-dr-view" onclick="event.stopPropagation(); openModal(\'' + escHtml(r.book_id) + '\')">View</button>'
            + '</div>';
        });
        rowsHtml = '<div class="dr-list">' + rows.join('') + '</div>';
      }

      panel.innerHTML = '<div class="dr-panel">'
        + '<div class="dr-header">'
        + '<div class="dr-count">' + countText + selectedText + '</div>'
        + '<div class="dr-controls">'
        + '<label class="dr-select-all-label">'
        + '<input type="checkbox" id="chkSelectAll" ' + (allSelected ? 'checked ' : '') + 'onchange="toggleSelectAll(this.checked)" />'
        + '<span>Select All</span>'
        + '</label>'
        + bulkBtns
        + '</div>'
        + '</div>'
        + rowsHtml
        + '</div>';
    }

    function drRowClick(reviewId) {
      var chk = document.getElementById('chk-' + reviewId);
      if (chk) toggleReviewCheck(reviewId, !chk.checked);
    }

    function toggleReviewCheck(reviewId, checked) {
      if (checked) selectedReviewIds.add(reviewId);
      else selectedReviewIds.delete(reviewId);
      renderDateRangeResults();
    }

    function toggleSelectAll(checked) {
      const matched = reviewsInRange();
      if (checked) matched.forEach(r => selectedReviewIds.add(r.id));
      else selectedReviewIds.clear();
      renderDateRangeResults();
    }

    async function bulkPublish(publishedVal) {
      if (selectedReviewIds.size === 0) return;
      const ids = [...selectedReviewIds];
      const label = publishedVal ? 'Publish' : 'Unpublish';
      if (!confirm(`${label} ${ids.length} review${ids.length !== 1 ? 's' : ''}?`)) return;

      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/pro_reviews?id=in.(${ids.join(',')})`, {
          method: 'PATCH',
          headers,
          body: JSON.stringify({ published: publishedVal })
        });
        if (!res.ok) {
          const err = await res.text();
          throw new Error(err);
        }
        allReviews = allReviews.map(r => selectedReviewIds.has(r.id) ? { ...r, published: publishedVal } : r);
        selectedReviewIds.clear();
        renderDateRangeResults();
      } catch (e) {
        alert('Bulk update failed: ' + e.message);
      }
    }

    // ── EVENTS ──
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalOverlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeModal();
    });
    document.getElementById('btnSaveReview').addEventListener('click', saveReview);
    document.getElementById('btnClearForm').addEventListener('click', clearForm);

    document.querySelectorAll('.filter-btn:not(.sort-btn)').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn:not(.sort-btn)').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        renderList();
      });
    });

    document.querySelectorAll('.sort-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        sortMode = btn.dataset.sort;
        renderList();
      });
    });

    document.getElementById('searchBox').addEventListener('input', e => {
      searchQuery = e.target.value;
      renderList();
    });

    document.getElementById('dateFrom').addEventListener('change', applyDateRange);
    document.getElementById('dateTo').addEventListener('change', applyDateRange);
    document.getElementById('btnClearDates').addEventListener('click', clearDateRange);

    // ── INIT: load data, then auto-open modal if ?book= param is present ──
    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = '/login.html'; return; }

      try {
        const res = await fetch('/api/admin/users', {
          headers: { Authorization: `Bearer ${session.access_token}` }
        });
        if (res.ok) {
          const { users } = await res.json();
          (users || []).forEach(u => { userMap[u.id] = u.email; });
        }
      } catch (_) {}

      await loadAll();
      const bookId = new URLSearchParams(window.location.search).get('book');
      if (bookId && allBooks.find(b => b.id === bookId)) {
        openModal(bookId);
      }
    }

    init();
  </script>
</body>
</html>
