<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Reviews — The Whole Book</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111318;
      --surface: #1a1d24;
      --surface2: #20242d;
      --border: #2e3240;
      --accent: #e8b86d;
      --accent-glow: rgba(232,184,109,0.15);
      --text: #edeef2;
      --muted: #6b7080;
      --success: #6fcf97;
      --error: #eb5757;
      --pro: #7eb8f7;
      --rated: #b89df7;
    }

    body { min-height: 100vh; background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); opacity: 0; transition: opacity 0.4s; }
    body.ready { opacity: 1; }

    nav {
      position: sticky; top: 0; z-index: 50;
      background: rgba(17,19,24,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 40px; display: flex; align-items: center; justify-content: space-between; height: 58px;
    }
    .nav-brand { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 700; color: var(--text); }
    .nav-brand span { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 16px; font-size: 13px; color: var(--muted); }
    .btn-ghost { background: none; border: 1px solid var(--border); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 6px 14px; border-radius: 2px; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    main { max-width: 1100px; margin: 0 auto; padding: 52px 32px 80px; }

    .page-header { margin-bottom: 36px; }
    .page-header h1 { font-family: 'Cormorant Garamond', serif; font-size: 48px; font-weight: 700; letter-spacing: -0.01em; line-height: 1; margin-bottom: 8px; }
    .page-header h1 span { color: var(--accent); }
    .page-header p { color: var(--muted); font-size: 14px; font-weight: 300; }

    /* Book picker */
    .book-picker {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px 24px;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .book-picker-label {
      font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); white-space: nowrap; flex-shrink: 0;
    }

    .book-search-wrap { position: relative; flex: 1; }

    .book-search-wrap input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 2px; padding: 10px 13px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .book-search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .book-search-wrap input::placeholder { color: var(--muted); }

    .book-results {
      position: absolute; top: 100%; left: 0; right: 0;
      background: var(--surface); border: 1px solid var(--border); border-top: none;
      border-radius: 0 0 3px 3px; max-height: 200px; overflow-y: auto; z-index: 20; display: none;
    }
    .book-results.open { display: block; }
    .book-option { padding: 10px 14px; cursor: pointer; font-size: 13px; transition: background 0.15s; }
    .book-option:hover { background: rgba(232,184,109,0.08); }
    .book-option small { color: var(--muted); display: block; font-size: 11px; }

    .btn-new {
      background: none; border: 1px solid var(--border); color: var(--muted);
      font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 10px 18px;
      border-radius: 2px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-new:hover { border-color: var(--accent); color: var(--accent); }

    .btn-delete-book {
      background: none; border: 1px solid var(--border); color: var(--error);
      font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 10px 18px;
      border-radius: 2px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: border-color 0.2s, background 0.2s;
    }
    .btn-delete-book:hover { border-color: var(--error); background: rgba(235,87,87,0.08); }

    /* Form - identical to reviewer.html */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .form-full { margin-bottom: 20px; }

    .section { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 28px 28px 24px; position: relative; }
    .section::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; border-radius: 4px 4px 0 0; }
    .section.book-section::before  { background: var(--accent); }
    .section.rated-section::before { background: var(--rated); }
    .section.pro-section::before   { background: var(--pro); }

    .section-label { font-size: 10px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    .section.book-section  .section-label { color: var(--accent); }
    .section.rated-section .section-label { color: var(--rated); }
    .section.pro-section   .section-label { color: var(--pro); }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .field { margin-bottom: 16px; }
    .field:last-child { margin-bottom: 0; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }

    label { display: block; font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
    .optional { font-size: 10px; font-weight: 400; letter-spacing: 0; text-transform: none; opacity: 0.7; margin-left: 3px; }

    input, textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 2px; padding: 10px 13px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    input:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    textarea { resize: vertical; min-height: 100px; line-height: 1.6; }

    /* Multi pro reviews */
    .pro-review-item { border: 1px solid var(--border); border-radius: 3px; padding: 20px; margin-bottom: 16px; background: var(--surface2); animation: slideIn 0.25s ease both; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    .review-item-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .review-item-num { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--pro); font-weight: 500; }
    .btn-remove-review { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; line-height: 1; padding: 0 4px; transition: color 0.15s; }
    .btn-remove-review:hover { color: var(--error); }
    .btn-add-review { background: none; border: 1px dashed var(--border); color: var(--pro); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 0.06em; padding: 10px 20px; border-radius: 2px; cursor: pointer; width: 100%; transition: border-color 0.2s, background 0.2s; margin-top: 4px; }
    .btn-add-review:hover { border-color: var(--pro); background: rgba(126,184,247,0.05); }

    /* Submit */
    .submit-row { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; padding-top: 28px; border-top: 1px solid var(--border); }
    .submit-hint { font-size: 12px; color: var(--muted); font-weight: 300; }

    .btn-submit { background: var(--accent); color: #111318; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; border: none; padding: 13px 36px; border-radius: 2px; cursor: pointer; transition: opacity 0.2s, transform 0.1s; display: flex; align-items: center; gap: 8px; }
    .btn-submit:hover { opacity: 0.88; }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

    .spinner { display: none; width: 13px; height: 13px; border: 2px solid rgba(17,19,24,0.3); border-top-color: #111318; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-submit.loading .spinner { display: block; }
    .btn-submit.loading .btn-label { display: none; }

    /* Toast */
    .toast { position: fixed; bottom: 32px; right: 32px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 14px 20px; font-size: 13px; display: flex; align-items: center; gap: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); transform: translateY(80px); opacity: 0; transition: transform 0.3s ease, opacity 0.3s ease; z-index: 200; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: var(--success); }
    .toast.error   { border-color: var(--error); }
    .toast-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .toast.success .toast-dot { background: var(--success); }
    .toast.error   .toast-dot { background: var(--error); }

    @media (max-width: 768px) {
      .form-grid, .field-row { grid-template-columns: 1fr; }
      main { padding: 32px 16px 60px; }
      nav { padding: 0 16px; }
      .book-picker { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-brand">The Whole<span>Book</span></div>
    <div class="nav-right">
      <a href="/admin.html" style="color:var(--muted);text-decoration:none;font-size:12px">← Dashboard</a>
      <span id="user-email-display"></span>
      <button class="btn-ghost" onclick="handleLogout()">Sign Out</button>
    </div>
  </nav>

  <main>
    <div class="page-header">
      <h1>Manage <span>Reviews</span></h1>
      <p>Search for an existing book to edit, or add a new one.</p>
    </div>

    <!-- Book picker -->
    <div class="book-picker">
      <span class="book-picker-label">Book</span>
      <div class="book-search-wrap">
        <input type="text" id="bookSearch" placeholder="Search by title or author…" autocomplete="off" oninput="searchBooks(this.value)"/>
        <div class="book-results" id="bookResults"></div>
      </div>
      <button class="btn-new" onclick="clearForm()">+ New Book</button>
      <button class="btn-delete-book" id="deleteBookBtn" style="display:none" onclick="deleteBook()">Delete Book</button>
    </div>

    <!-- Book Details + Rated Report -->
    <div class="form-grid">
      <div class="section book-section">
        <div class="section-label">Book Details</div>
        <div class="field"><label>Title</label><input type="text" id="b-title" placeholder="Book title"/></div>
        <div class="field"><label>Author</label><input type="text" id="b-author" placeholder="Author name"/></div>
        <div class="field"><label>ISBN</label><input type="text" id="b-isbn" placeholder="978-0-000-00000-0"/></div>
        <div class="field"><label>Cover Art URL <span class="optional">optional</span></label><input type="url" id="b-cover" placeholder="https://…"/></div>
        <div class="field"><label>Goodreads Rating <span class="optional">optional</span></label><input type="text" id="b-goodreads" placeholder="e.g. 4.23"/></div>
      </div>

      <div class="section rated-section">
        <div class="section-label">Rated Books Report</div>
        <div class="field"><label>Rating <span class="optional">1–5</span></label><input type="number" id="r-rating" min="1" max="5" placeholder="e.g. 3"/></div>
        <div class="field"><label>Flagged Categories <span class="optional">optional</span></label><input type="text" id="r-flagged" placeholder="e.g. Violence, Language, Sexual Content"/></div>
        <div class="field"><label>Excerpts <span class="optional">optional</span></label><textarea id="r-excerpts" placeholder="Notable excerpts from the book…"></textarea></div>
        <div class="field"><label>Report URL <span class="optional">optional</span></label><input type="url" id="r-report-url" placeholder="https://ratedbooks.org/…"/></div>
      </div>
    </div>

    <!-- Pro Reviews -->
    <div class="form-full">
      <div class="section pro-section">
        <div class="section-label">Professional Reviews</div>
        <div id="pro-reviews-list"></div>
        <button type="button" class="btn-add-review" onclick="addProReview()">+ Add Another Review</button>
      </div>
    </div>

    <div class="submit-row">
      <span class="submit-hint" id="submit-hint">Fill in the details above and save.</span>
      <button class="btn-submit" id="submitBtn" onclick="handleSubmit()">
        <span class="btn-label">Save Book</span>
        <div class="spinner"></div>
      </button>
    </div>
  </main>

  <div class="toast" id="toast">
    <div class="toast-dot"></div>
    <span id="toast-msg"></span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ── CONFIG ── Replace with your actual Supabase project values ──────────
    const SUPABASE_URL = 'https://cqslqfztgtuuidgdkyyz.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_TBJdijzfEaYzBDBeqAy2CA_edJMKfgz';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser    = null;
    let allBooks       = [];
    let currentBookId  = null;
    let existingRatedId = null;
    let proReviewCount = 0;

    // ── Auth ──────────────────────────────────────────────────────────────
    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = '/login.html'; return; }
      currentUser = session.user;
      document.getElementById('user-email-display').textContent = currentUser.email;
      document.body.classList.add('ready');
      await loadAllBooks();
      // Check if a book ID was passed in the URL
      const params = new URLSearchParams(window.location.search);
      const bookId = params.get('book');
      if (bookId) {
        await loadBook(bookId);
      } else {
        addProReview(); // start with one empty block
      }
    }

    async function handleLogout() {
      await sb.auth.signOut();
      window.location.href = '/login.html';
    }

    // ── Book search ───────────────────────────────────────────────────────
    async function loadAllBooks() {
      const { data } = await sb.from('books').select('id, title, author').order('title');
      allBooks = data || [];
    }

    function searchBooks(query) {
      const results = document.getElementById('bookResults');
      if (!query) { results.classList.remove('open'); return; }
      const matches = allBooks.filter(b =>
        b.title.toLowerCase().includes(query.toLowerCase()) ||
        (b.author || '').toLowerCase().includes(query.toLowerCase())
      ).slice(0, 10);
      if (!matches.length) { results.classList.remove('open'); return; }
      results.innerHTML = matches.map(b =>
        `<div class="book-option" onclick="loadBook('${b.id}')">
          ${b.title}<small>${b.author || ''}</small>
        </div>`).join('');
      results.classList.add('open');
    }

    document.addEventListener('click', e => {
      if (!e.target.closest('.book-search-wrap'))
        document.getElementById('bookResults').classList.remove('open');
    });

    // ── Load book into form ───────────────────────────────────────────────
    async function loadBook(bookId) {
      document.getElementById('bookResults').classList.remove('open');

      const [bookRes, ratedRes, proRes] = await Promise.all([
        sb.from('books').select('*').eq('id', bookId).single(),
        sb.from('rated_reports').select('*').eq('book_id', bookId).maybeSingle(),
        sb.from('pro_reviews').select('*').eq('book_id', bookId).order('created_at')
      ]);

      if (bookRes.error) { showToast('Could not load book.', 'error'); return; }

      const book  = bookRes.data;
      const rated = ratedRes.data;
      const pros  = proRes.data || [];

      currentBookId   = book.id;
      existingRatedId = rated?.id || null;

      // Update search box
      document.getElementById('bookSearch').value = `${book.title}${book.author ? ' — ' + book.author : ''}`;

      // Fill book fields
      document.getElementById('b-title').value  = book.title    || '';
      document.getElementById('b-author').value = book.author   || '';
      document.getElementById('b-isbn').value   = book.isbn     || '';
      document.getElementById('b-cover').value  = book.cover_url || '';
      document.getElementById('b-goodreads').value = book.goodreads_rating || '';

      // Fill rated report
      document.getElementById('r-rating').value     = rated?.rating             || '';
      document.getElementById('r-flagged').value    = rated?.flagged_categories || '';
      document.getElementById('r-excerpts').value   = rated?.excerpts           || '';
      document.getElementById('r-report-url').value = rated?.report_url         || '';

      // Fill pro reviews
      document.getElementById('pro-reviews-list').innerHTML = '';
      proReviewCount = 0;
      if (pros.length > 0) {
        pros.forEach(r => addProReview(r));
      } else {
        addProReview();
      }

      // Update UI state
      document.getElementById('deleteBookBtn').style.display = 'inline-flex';
      document.getElementById('submitBtn').querySelector('.btn-label').textContent = 'Save Changes';
      document.getElementById('submit-hint').textContent = 'Changes save to all sections at once.';
    }

    // ── Pro review blocks ─────────────────────────────────────────────────
    function addProReview(data) {
      proReviewCount++;
      const idx  = proReviewCount;
      const list = document.getElementById('pro-reviews-list');
      const div  = document.createElement('div');
      div.className = 'pro-review-item';
      div.id = 'pro-review-' + idx;
      if (data?.id) div.dataset.reviewId = data.id;

      div.innerHTML = `
        <div class="review-item-header">
          <span class="review-item-num">Review ${idx}</span>
          <button type="button" class="btn-remove-review" onclick="removeProReview(${idx})" title="Remove">×</button>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Source</label>
            <input type="text" id="p-source-${idx}" value="${esc(data?.source||'')}" placeholder="e.g. Publishers Weekly, Booklist"/>
          </div>
          <div class="field">
            <label>Award <span class="optional">optional</span></label>
            <input type="text" id="p-award-${idx}" value="${esc(data?.award||'')}" placeholder="e.g. Newbery Medal"/>
          </div>
        </div>
        <div class="field">
          <label>Review Summary</label>
          <textarea id="p-summary-${idx}" style="min-height:110px" placeholder="Paste or summarize the professional review here…">${esc(data?.summary||'')}</textarea>
        </div>
        <div class="field">
          <label>Review URL <span class="optional">optional</span></label>
          <input type="url" id="p-url-${idx}" value="${esc(data?.url||'')}" placeholder="https://…"/>
        </div>`;
      list.appendChild(div);
    }

    function removeProReview(idx) {
      const el = document.getElementById('pro-review-' + idx);
      if (el) el.remove();
    }

    function esc(str) {
      return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── Clear form (new book) ─────────────────────────────────────────────
    function clearForm() {
      currentBookId   = null;
      existingRatedId = null;
      document.getElementById('bookSearch').value = '';
      ['b-title','b-author','b-isbn','b-cover','b-goodreads',
       'r-rating','r-flagged','r-excerpts','r-report-url'
      ].forEach(id => document.getElementById(id).value = '');
      document.getElementById('pro-reviews-list').innerHTML = '';
      proReviewCount = 0;
      addProReview();
      document.getElementById('deleteBookBtn').style.display = 'none';
      document.getElementById('submitBtn').querySelector('.btn-label').textContent = 'Save Book';
      document.getElementById('submit-hint').textContent = 'All three records will be saved together.';
    }

    // ── Save ──────────────────────────────────────────────────────────────
    async function handleSubmit() {
      const title = document.getElementById('b-title').value.trim();
      if (!title) { showToast('Please enter a book title.', 'error'); return; }

      const btn = document.getElementById('submitBtn');
      btn.classList.add('loading'); btn.disabled = true;

      try {
        let bookId;

        if (currentBookId) {
          const { error } = await sb.from('books').update({
            title,
            author:    document.getElementById('b-author').value.trim() || null,
            isbn:      document.getElementById('b-isbn').value.trim()   || null,
            cover_url: document.getElementById('b-cover').value.trim()  || null,
            goodreads_rating: document.getElementById('b-goodreads').value.trim() || null,
          }).eq('id', currentBookId);
          if (error) throw new Error('Book: ' + error.message);
          bookId = currentBookId;
        } else {
          const { data, error } = await sb.from('books').insert({
            title,
            author:    document.getElementById('b-author').value.trim() || null,
            isbn:      document.getElementById('b-isbn').value.trim()   || null,
            cover_url: document.getElementById('b-cover').value.trim()  || null,
            goodreads_rating: document.getElementById('b-goodreads').value.trim() || null,
          }).select('id').single();
          if (error) throw new Error('Book: ' + error.message);
          bookId = data.id;
          currentBookId = bookId;
        }

        // Rated report
        const rating    = document.getElementById('r-rating').value;
        const flagged   = document.getElementById('r-flagged').value.trim();
        const excerpts  = document.getElementById('r-excerpts').value.trim();
        const reportUrl = document.getElementById('r-report-url').value.trim();
        const ratedPayload = {
          book_id: bookId, user_id: currentUser.id,
          rating: rating ? parseInt(rating) : null,
          flagged_categories: flagged || null,
          excerpts: excerpts || null,
          report_url: reportUrl || null,
        };

        if (existingRatedId) {
          const { error } = await sb.from('rated_reports').update(ratedPayload).eq('id', existingRatedId);
          if (error) throw new Error('Rated report: ' + error.message);
        } else if (rating || flagged || excerpts || reportUrl) {
          const { data, error } = await sb.from('rated_reports').insert(ratedPayload).select('id').single();
          if (error) throw new Error('Rated report: ' + error.message);
          existingRatedId = data.id;
        }

        // Pro reviews
        const reviewItems = document.querySelectorAll('.pro-review-item');
        for (const item of reviewItems) {
          const idx     = item.id.replace('pro-review-', '');
          const source  = document.getElementById('p-source-'  + idx)?.value.trim();
          const award   = document.getElementById('p-award-'   + idx)?.value.trim();
          const summary = document.getElementById('p-summary-' + idx)?.value.trim();
          const proUrl  = document.getElementById('p-url-'     + idx)?.value.trim();
          const rid     = item.dataset.reviewId;

          const payload = { book_id: bookId, user_id: currentUser.id, source: source||null, award: award||null, summary: summary||null, url: proUrl||null };

          if (rid) {
            if (source || summary || proUrl) {
              const { error } = await sb.from('pro_reviews').update(payload).eq('id', rid);
              if (error) throw new Error('Pro review: ' + error.message);
            } else {
              await sb.from('pro_reviews').delete().eq('id', rid);
            }
          } else if (source || summary || proUrl) {
            const { error } = await sb.from('pro_reviews').insert(payload);
            if (error) throw new Error('Pro review: ' + error.message);
          }
        }

        showToast(currentBookId === bookId && !currentBookId ? 'Book saved!' : 'Changes saved!', 'success');
        await loadAllBooks();
        document.getElementById('deleteBookBtn').style.display = 'inline-flex';
        document.getElementById('submitBtn').querySelector('.btn-label').textContent = 'Save Changes';

      } catch(err) {
        showToast(err.message, 'error');
      } finally {
        btn.classList.remove('loading'); btn.disabled = false;
      }
    }

    // ── Delete book ───────────────────────────────────────────────────────
    async function deleteBook() {
      if (!confirm('Delete this book and all its reviews? This cannot be undone.')) return;
      await sb.from('pro_reviews').delete().eq('book_id', currentBookId);
      await sb.from('rated_reports').delete().eq('book_id', currentBookId);
      const { error } = await sb.from('books').delete().eq('id', currentBookId);
      if (error) { showToast(error.message, 'error'); return; }
      showToast('Book deleted.', 'success');
      await loadAllBooks();
      clearForm();
    }

    // ── Toast ─────────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg, type) {
      const toast = document.getElementById('toast');
      document.getElementById('toast-msg').textContent = msg;
      toast.className = `toast ${type} show`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 4000);
    }

    init();
  </script>
</body>
</html>
