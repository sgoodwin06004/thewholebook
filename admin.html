<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1a1a24;
      --border: #2a2a3a;
      --accent: #7c6aff;
      --accent-glow: rgba(124,106,255,0.2);
      --text: #e8e8f0;
      --muted: #666680;
      --success: #6bffb8;
      --error: #ff6b6b;
      --pro: #7eb8f7;
      --rated: #b89df7;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'DM Mono', monospace;
      color: var(--text);
      opacity: 0;
      transition: opacity 0.3s;
    }
    body.ready { opacity: 1; }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .nav-brand { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; letter-spacing: -0.02em; }
    .nav-brand span { color: var(--accent); }

    .nav-right { display: flex; align-items: center; gap: 16px; font-size: 12px; color: var(--muted); }

    .logout-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 3px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .logout-btn:hover { border-color: var(--accent); color: var(--accent); }

    main { max-width: 1000px; margin: 0 auto; padding: 40px 32px 80px; }

    .welcome { margin-bottom: 32px; }
    .welcome h1 { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 6px; }
    .welcome p { color: var(--muted); font-size: 13px; }

    /* Tabs */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
      gap: 0;
    }

    .tab {
      padding: 10px 24px;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab:hover:not(.active) { color: var(--text); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Panel */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
    }

    .panel-title { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: none;
      padding: 7px 16px;
      border-radius: 3px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.85; }

    /* Invite form */
    .invite-form {
      display: none;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(124,106,255,0.05);
      gap: 10px;
      align-items: center;
    }
    .invite-form.open { display: flex; }
    .invite-form input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 8px 12px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      outline: none;
    }
    .invite-form input:focus { border-color: var(--accent); }
    .invite-form input::placeholder { color: var(--muted); }

    .send-btn {
      background: none;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 8px 18px;
      border-radius: 3px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, color 0.2s;
    }
    .send-btn:hover { background: var(--accent); color: #fff; }

    .invite-msg { font-size: 11px; padding: 0 24px 10px; display: none; }
    .invite-msg.error { color: var(--error); display: block; }
    .invite-msg.success { color: var(--success); display: block; }

    /* Rows */
    .data-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 24px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      gap: 12px;
      transition: background 0.15s;
    }
    .data-row:last-child { border-bottom: none; }
    .data-row:hover { background: rgba(255,255,255,0.02); }

    .row-main { flex: 1; min-width: 0; }
    .row-title { color: var(--text); font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row-meta { color: var(--muted); font-size: 11px; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .row-actions { display: flex; gap: 6px; flex-shrink: 0; }

    .btn-edit, .btn-delete {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-edit { background: none; border: 1px solid var(--border); color: var(--text); }
    .btn-edit:hover { border-color: var(--accent); color: var(--accent); }
    .btn-delete { background: none; border: 1px solid var(--border); color: var(--muted); }
    .btn-delete:hover { border-color: var(--error); color: var(--error); }

    .user-badge {
      font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 3px 8px; border-radius: 2px;
    }
    .badge-confirmed { background: rgba(107,255,184,0.1); color: var(--success); border: 1px solid rgba(107,255,184,0.3); }
    .badge-pending   { background: rgba(255,200,100,0.1); color: #ffc864; border: 1px solid rgba(255,200,100,0.3); }

    .role-select {
      background: var(--bg); border: 1px solid var(--border); border-radius: 3px;
      color: var(--text); font-family: 'DM Mono', monospace; font-size: 11px;
      padding: 5px 10px; cursor: pointer; outline: none; transition: border-color 0.2s;
    }
    .role-select:focus { border-color: var(--accent); }

    .empty-state { padding: 32px 24px; text-align: center; color: var(--muted); font-size: 12px; }
    .loading-row  { padding: 20px 24px; color: var(--muted); font-size: 12px; }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 200;
      align-items: center; justify-content: center;
      backdrop-filter: blur(3px);
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
      padding: 32px 36px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      animation: modalIn 0.2s ease both;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.97) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal h2 { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; margin-bottom: 24px; letter-spacing: -0.02em; }

    .field { margin-bottom: 16px; }
    .field:last-of-type { margin-bottom: 0; }
    .field label { display: block; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }

    .field input, .field textarea, .field select {
      width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 3px;
      padding: 9px 12px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }
    .field input::placeholder, .field textarea::placeholder { color: var(--muted); }
    .field textarea { resize: vertical; min-height: 90px; line-height: 1.6; }

    .modal-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }

    .btn-save {
      background: var(--accent); color: #fff; font-family: 'DM Mono', monospace;
      font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
      border: none; padding: 9px 22px; border-radius: 3px; cursor: pointer; transition: opacity 0.2s;
    }
    .btn-save:hover { opacity: 0.85; }
    .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-cancel {
      background: none; border: 1px solid var(--border); color: var(--muted);
      font-family: 'DM Mono', monospace; font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.08em; padding: 9px 18px; border-radius: 3px; cursor: pointer;
    }
    .btn-cancel:hover { border-color: var(--text); color: var(--text); }

    .form-msg { font-size: 11px; margin-top: 10px; text-align: right; min-height: 16px; }
    .form-msg.error { color: var(--error); }
    .form-msg.success { color: var(--success); }

    /* Book search */
    .book-search-wrap { position: relative; }
    .book-results {
      position: absolute; top: 100%; left: 0; right: 0;
      background: var(--surface); border: 1px solid var(--border); border-top: none;
      border-radius: 0 0 3px 3px; max-height: 180px; overflow-y: auto; z-index: 10; display: none;
    }
    .book-results.open { display: block; }
    .book-option { padding: 9px 12px; cursor: pointer; font-size: 12px; transition: background 0.15s; }
    .book-option:hover { background: var(--accent-glow); }
    .book-option small { color: var(--muted); display: block; font-size: 10px; }

    /* Field row */
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-brand">Admin<span>.</span></div>
    <div class="nav-right">
      <span id="user-email-display"></span>
      <button class="logout-btn" onclick="handleLogout()">Sign Out</button>
    </div>
  </nav>

  <main>
    <div class="welcome">
      <h1>Dashboard</h1>
      <p>Manage users, reviews and reports.</p>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" id="tab-users"  onclick="switchTab('users')">Users</div>
      <div class="tab"        id="tab-pro"    onclick="switchTab('pro')">Pro Reviews</div>
      <div class="tab"        id="tab-rated"  onclick="switchTab('rated')">Rated Reports</div>
    </div>

    <!-- Users Tab -->
    <div class="tab-panel active" id="panel-users">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">All Users</span>
          <button class="btn-primary" onclick="toggleInvite()">+ Invite User</button>
        </div>
        <div class="invite-form" id="inviteForm">
          <input type="email" id="inviteEmail" placeholder="colleague@example.com"/>
          <button class="send-btn" onclick="sendInvite()">Send Invite</button>
        </div>
        <div class="invite-msg" id="inviteMsg"></div>
        <div id="userList"><div class="loading-row">Loading users…</div></div>
      </div>
    </div>

    <!-- Pro Reviews Tab -->
    <div class="tab-panel" id="panel-pro">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">All Pro Reviews</span>
          <button class="btn-primary" onclick="openModal('pro')">+ Add Review</button>
        </div>
        <div id="proList"><div class="loading-row">Loading…</div></div>
      </div>
    </div>

    <!-- Rated Reports Tab -->
    <div class="tab-panel" id="panel-rated">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">All Rated Reports</span>
          <button class="btn-primary" onclick="openModal('rated')">+ Add Report</button>
        </div>
        <div id="ratedList"><div class="loading-row">Loading…</div></div>
      </div>
    </div>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 id="modal-title">Edit</h2>

      <div class="field">
        <label>Book</label>
        <div class="book-search-wrap">
          <input type="text" id="m-book-search" placeholder="Search by title or author…" autocomplete="off" oninput="searchBooks(this.value)"/>
          <div class="book-results" id="bookResults"></div>
        </div>
        <input type="hidden" id="m-book-id"/>
      </div>

      <!-- Pro fields -->
      <div id="modal-pro-fields">
        <div class="field-row" style="margin-bottom:16px">
          <div class="field" style="margin:0">
            <label>Source</label>
            <input type="text" id="m-source" placeholder="e.g. Publishers Weekly"/>
          </div>
          <div class="field" style="margin:0">
            <label>Award</label>
            <input type="text" id="m-award" placeholder="optional"/>
          </div>
        </div>
        <div class="field">
          <label>Summary</label>
          <textarea id="m-summary" placeholder="Review summary…"></textarea>
        </div>
        <div class="field">
          <label>URL</label>
          <input type="url" id="m-url" placeholder="https://…"/>
        </div>
      </div>

      <!-- Rated fields -->
      <div id="modal-rated-fields" style="display:none">
        <div class="field">
          <label>Rating (1–5)</label>
          <input type="number" id="m-rating" min="1" max="5" placeholder="1–5"/>
        </div>
        <div class="field">
          <label>Flagged Categories</label>
          <input type="text" id="m-flagged" placeholder="e.g. Violence, Language"/>
        </div>
        <div class="field">
          <label>Excerpts</label>
          <textarea id="m-excerpts" placeholder="Notable excerpts…"></textarea>
        </div>
        <div class="field">
          <label>Report URL</label>
          <input type="url" id="m-report-url" placeholder="https://…"/>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" id="saveBtn" onclick="saveRecord()">Save</button>
      </div>
      <div class="form-msg" id="formMsg"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
     // ── CONFIG ── Replace with your actual Supabase project values ──────────
    const SUPABASE_URL = 'https://cqslqfztgtuuidgdkyyz.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_TBJdijzfEaYzBDBeqAy2CA_edJMKfgz';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let allBooks    = [];
    let modalType   = 'pro';  // 'pro' or 'rated'
    let editingId   = null;

    // ── Init ──────────────────────────────────────────────────────────────
    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = '/login.html'; return; }
      currentUser = session.user;
      document.getElementById('user-email-display').textContent = currentUser.email;
      document.body.classList.add('ready');
      await loadBooks();
      loadUsers();
    }

    async function handleLogout() {
      await sb.auth.signOut();
      window.location.href = '/login.html';
    }

    async function getToken() {
      const { data } = await sb.auth.getSession();
      return data.session?.access_token;
    }

    // ── Tabs ──────────────────────────────────────────────────────────────
    function switchTab(tab) {
      ['users','pro','rated'].forEach(t => {
        document.getElementById('tab-'   + t).classList.toggle('active', t === tab);
        document.getElementById('panel-' + t).classList.toggle('active', t === tab);
      });
      if (tab === 'pro')   loadProReviews();
      if (tab === 'rated') loadRatedReports();
    }

    // ── Books ─────────────────────────────────────────────────────────────
    async function loadBooks() {
      const { data } = await sb.from('books').select('id, title, author').order('title');
      allBooks = data || [];
    }

    function searchBooks(query) {
      const results = document.getElementById('bookResults');
      if (!query) { results.classList.remove('open'); return; }
      const matches = allBooks.filter(b =>
        b.title.toLowerCase().includes(query.toLowerCase()) ||
        (b.author || '').toLowerCase().includes(query.toLowerCase())
      ).slice(0, 8);
      if (!matches.length) { results.classList.remove('open'); return; }
      results.innerHTML = matches.map(b =>
        `<div class="book-option" onclick="selectBook('${b.id}','${b.title.replace(/'/g,"\\'")}','${(b.author||'').replace(/'/g,"\\'")}')">
          ${b.title}<small>${b.author || ''}</small>
        </div>`).join('');
      results.classList.add('open');
    }

    function selectBook(id, title, author) {
      document.getElementById('m-book-search').value = `${title}${author ? ' — ' + author : ''}`;
      document.getElementById('m-book-id').value = id;
      document.getElementById('bookResults').classList.remove('open');
    }

    document.addEventListener('click', e => {
      if (!e.target.closest('.book-search-wrap'))
        document.getElementById('bookResults').classList.remove('open');
    });

    // ── Users ─────────────────────────────────────────────────────────────
    async function loadUsers() {
      const list = document.getElementById('userList');
      try {
        const token = await getToken();
        const res = await fetch('/api/admin/users', { headers: { Authorization: `Bearer ${token}` } });
        if (!res.ok) throw new Error('Could not load users');
        const { users } = await res.json();
        list.innerHTML = '';
        if (!users?.length) { list.innerHTML = '<div class="empty-state">No users found.</div>'; return; }
        users.forEach(u => {
          const row = document.createElement('div');
          row.className = 'data-row';
          const confirmed = !!u.email_confirmed_at;
          const role = u.role || 'reviewer';
          row.innerHTML = `
            <div class="row-main">
              <div class="row-title">${u.email}</div>
              <div class="row-meta">Added ${new Date(u.created_at).toLocaleDateString()}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <select class="role-select" data-id="${u.id}" onchange="updateRole(this)">
                <option value="reviewer" ${role==='reviewer'?'selected':''}>Reviewer</option>
                <option value="admin"    ${role==='admin'   ?'selected':''}>Admin</option>
              </select>
              <span class="user-badge ${confirmed?'badge-confirmed':'badge-pending'}">
                ${confirmed?'Active':'Pending'}
              </span>
            </div>`;
          list.appendChild(row);
        });
      } catch(e) {
        list.innerHTML = `<div class="empty-state">${e.message}</div>`;
      }
    }

    async function updateRole(select) {
      const token = await getToken();
      const res = await fetch('/api/admin/set-role', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ userId: select.dataset.id, role: select.value })
      });
      const data = await res.json();
      if (!res.ok) alert('Error: ' + data.error);
    }

    function toggleInvite() {
      const f = document.getElementById('inviteForm');
      f.classList.toggle('open');
      if (f.classList.contains('open')) document.getElementById('inviteEmail').focus();
    }

    async function sendInvite() {
      const email = document.getElementById('inviteEmail').value.trim();
      if (!email) { showInviteMsg('Please enter an email.', 'error'); return; }
      showInviteMsg('Sending…', '');
      const token = await getToken();
      const res = await fetch('/api/admin/invite', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      if (!res.ok) {
        showInviteMsg(data.error || 'Failed.', 'error');
      } else {
        showInviteMsg(`Invite sent to ${email}`, 'success');
        document.getElementById('inviteEmail').value = '';
        document.getElementById('inviteForm').classList.remove('open');
        setTimeout(loadUsers, 1500);
      }
    }

    function showInviteMsg(text, type) {
      const el = document.getElementById('inviteMsg');
      el.textContent = text;
      el.className = 'invite-msg ' + type;
    }

    // ── Pro Reviews ───────────────────────────────────────────────────────
    async function loadProReviews() {
      const list = document.getElementById('proList');
      list.innerHTML = '<div class="loading-row">Loading…</div>';
      const { data, error } = await sb
        .from('pro_reviews')
        .select('*, books(title, author), profiles(email)')
        .order('created_at', { ascending: false });

      if (error) { list.innerHTML = `<div class="empty-state">${error.message}</div>`; return; }
      if (!data.length) { list.innerHTML = '<div class="empty-state">No pro reviews yet.</div>'; return; }

      list.innerHTML = '';
      data.forEach(r => {
        const row = document.createElement('div');
        row.className = 'data-row';
        row.innerHTML = `
          <div class="row-main">
            <div class="row-title">${r.books?.title || 'Unknown'} — ${r.source || 'No source'}</div>
            <div class="row-meta">${r.books?.author || ''} · ${r.profiles?.email || 'unknown'} · ${new Date(r.created_at).toLocaleDateString()}</div>
          </div>
          <div class="row-actions">
            <button class="btn-edit"   onclick="openEdit('pro','${r.id}')">Edit</button>
            <button class="btn-delete" onclick="deleteRecord('pro','${r.id}',this)">Delete</button>
          </div>`;
        list.appendChild(row);
      });
    }

    // ── Rated Reports ─────────────────────────────────────────────────────
    async function loadRatedReports() {
      const list = document.getElementById('ratedList');
      list.innerHTML = '<div class="loading-row">Loading…</div>';
      const { data, error } = await sb
        .from('rated_reports')
        .select('*, books(title, author), profiles(email)')
        .order('created_at', { ascending: false });

      if (error) { list.innerHTML = `<div class="empty-state">${error.message}</div>`; return; }
      if (!data.length) { list.innerHTML = '<div class="empty-state">No rated reports yet.</div>'; return; }

      list.innerHTML = '';
      data.forEach(r => {
        const row = document.createElement('div');
        row.className = 'data-row';
        row.innerHTML = `
          <div class="row-main">
            <div class="row-title">${r.books?.title || 'Unknown'} — Rating: ${r.rating || '—'}</div>
            <div class="row-meta">${r.books?.author || ''} · ${r.profiles?.email || 'unknown'} · ${new Date(r.created_at).toLocaleDateString()}</div>
          </div>
          <div class="row-actions">
            <button class="btn-edit"   onclick="openEdit('rated','${r.id}')">Edit</button>
            <button class="btn-delete" onclick="deleteRecord('rated','${r.id}',this)">Delete</button>
          </div>`;
        list.appendChild(row);
      });
    }

    // ── Modal ─────────────────────────────────────────────────────────────
    function openModal(type) {
      modalType = type;
      editingId = null;
      document.getElementById('modal-title').textContent = type === 'pro' ? 'Add Pro Review' : 'Add Rated Report';
      document.getElementById('modal-pro-fields').style.display   = type === 'pro'   ? 'block' : 'none';
      document.getElementById('modal-rated-fields').style.display = type === 'rated' ? 'block' : 'none';
      clearModalForm();
      document.getElementById('modalOverlay').classList.add('open');
    }

    async function openEdit(type, id) {
      modalType = type;
      editingId = id;
      const table = type === 'pro' ? 'pro_reviews' : 'rated_reports';
      const { data } = await sb.from(table).select('*, books(title, author)').eq('id', id).single();
      if (!data) return;

      document.getElementById('modal-title').textContent = type === 'pro' ? 'Edit Pro Review' : 'Edit Rated Report';
      document.getElementById('modal-pro-fields').style.display   = type === 'pro'   ? 'block' : 'none';
      document.getElementById('modal-rated-fields').style.display = type === 'rated' ? 'block' : 'none';

      document.getElementById('m-book-id').value = data.book_id || '';
      document.getElementById('m-book-search').value = data.books
        ? `${data.books.title}${data.books.author ? ' — ' + data.books.author : ''}` : '';

      if (type === 'pro') {
        document.getElementById('m-source').value  = data.source  || '';
        document.getElementById('m-award').value   = data.award   || '';
        document.getElementById('m-summary').value = data.summary || '';
        document.getElementById('m-url').value     = data.url     || '';
      } else {
        document.getElementById('m-rating').value     = data.rating             || '';
        document.getElementById('m-flagged').value    = data.flagged_categories || '';
        document.getElementById('m-excerpts').value   = data.excerpts           || '';
        document.getElementById('m-report-url').value = data.report_url         || '';
      }

      document.getElementById('modalOverlay').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
      clearModalForm();
    }

    function clearModalForm() {
      ['m-book-search','m-book-id','m-source','m-award','m-summary','m-url',
       'm-rating','m-flagged','m-excerpts','m-report-url'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });
      document.getElementById('formMsg').textContent = '';
      document.getElementById('bookResults').classList.remove('open');
    }

    async function saveRecord() {
      const btn    = document.getElementById('saveBtn');
      const msg    = document.getElementById('formMsg');
      const bookId = document.getElementById('m-book-id').value;
      const table  = modalType === 'pro' ? 'pro_reviews' : 'rated_reports';

      if (!bookId) { msg.textContent = 'Please select a book.'; msg.className = 'form-msg error'; return; }

      btn.disabled = true;
      msg.textContent = '';

      let payload = { book_id: bookId, user_id: currentUser.id };

      if (modalType === 'pro') {
        payload.source  = document.getElementById('m-source').value.trim()  || null;
        payload.award   = document.getElementById('m-award').value.trim()   || null;
        payload.summary = document.getElementById('m-summary').value.trim() || null;
        payload.url     = document.getElementById('m-url').value.trim()     || null;
      } else {
        payload.rating             = parseInt(document.getElementById('m-rating').value)    || null;
        payload.flagged_categories = document.getElementById('m-flagged').value.trim()      || null;
        payload.excerpts           = document.getElementById('m-excerpts').value.trim()     || null;
        payload.report_url         = document.getElementById('m-report-url').value.trim()   || null;
      }

      let error;
      if (editingId) {
        ({ error } = await sb.from(table).update(payload).eq('id', editingId));
      } else {
        ({ error } = await sb.from(table).insert(payload));
      }

      btn.disabled = false;

      if (error) {
        msg.textContent = error.message;
        msg.className = 'form-msg error';
      } else {
        msg.textContent = 'Saved!';
        msg.className = 'form-msg success';
        setTimeout(() => {
          closeModal();
          if (modalType === 'pro')   loadProReviews();
          else                       loadRatedReports();
        }, 500);
      }
    }

    async function deleteRecord(type, id, btn) {
      if (!confirm('Delete this record? This cannot be undone.')) return;
      const table = type === 'pro' ? 'pro_reviews' : 'rated_reports';
      btn.textContent = '…';
      const { error } = await sb.from(table).delete().eq('id', id);
      if (error) { alert(error.message); btn.textContent = 'Delete'; return; }
      if (type === 'pro')   loadProReviews();
      else                  loadRatedReports();
    }

    init();
  </script>
</body>
</html>
