<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1a1a24;
      --border: #2a2a3a;
      --accent: #7c6aff;
      --accent-glow: rgba(124,106,255,0.2);
      --text: #e8e8f0;
      --muted: #666680;
      --success: #6bffb8;
      --error: #ff6b6b;
    }

    body { min-height: 100vh; background: var(--bg); font-family: 'DM Mono', monospace; color: var(--text); opacity: 0; transition: opacity 0.3s; }
    body.ready { opacity: 1; }

    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 32px; border-bottom: 1px solid var(--border);
      background: var(--surface); position: sticky; top: 0; z-index: 50;
    }
    .nav-brand { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; letter-spacing: -0.02em; }
    .nav-brand span { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 16px; font-size: 12px; color: var(--muted); }
    .logout-btn { background: none; border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; padding: 6px 14px; border-radius: 3px; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
    .logout-btn:hover { border-color: var(--accent); color: var(--accent); }

    main { max-width: 900px; margin: 0 auto; padding: 48px 32px 80px; }

    .welcome { margin-bottom: 40px; }
    .welcome h1 { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 8px; }
    .welcome p { color: var(--muted); font-size: 13px; }

    /* Quick actions */
    .quick-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 32px;
    }

    .action-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px 24px;
      text-decoration: none;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .action-card:hover { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }
    .action-card-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .action-card-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }
    .action-card-arrow { font-size: 20px; color: var(--accent); }

    /* Panel */
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 24px; }
    .panel-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid var(--border); }
    .panel-title { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }

    .invite-btn { background: var(--accent); color: #fff; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; border: none; padding: 7px 16px; border-radius: 3px; cursor: pointer; transition: opacity 0.2s; }
    .invite-btn:hover { opacity: 0.85; }

    .invite-form { display: none; padding: 16px 24px; border-bottom: 1px solid var(--border); background: rgba(124,106,255,0.05); gap: 10px; align-items: center; }
    .invite-form.open { display: flex; }
    .invite-form input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 8px 12px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; outline: none; }
    .invite-form input:focus { border-color: var(--accent); }
    .invite-form input::placeholder { color: var(--muted); }

    .send-btn { background: none; border: 1px solid var(--accent); color: var(--accent); font-family: 'DM Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; padding: 8px 18px; border-radius: 3px; cursor: pointer; white-space: nowrap; transition: background 0.2s, color 0.2s; }
    .send-btn:hover { background: var(--accent); color: #fff; }

    .invite-msg { font-size: 11px; padding: 0 24px 10px; display: none; }
    .invite-msg.error { color: var(--error); display: block; }
    .invite-msg.success { color: var(--success); display: block; }

    .data-row { display: flex; align-items: center; justify-content: space-between; padding: 13px 24px; border-bottom: 1px solid var(--border); font-size: 12px; gap: 12px; transition: background 0.15s; }
    .data-row:last-child { border-bottom: none; }
    .data-row:hover { background: rgba(255,255,255,0.02); }

    .row-email { color: var(--text); font-size: 13px; }
    .row-meta  { color: var(--muted); font-size: 11px; margin-top: 2px; }

    .user-badge { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 8px; border-radius: 2px; }
    .badge-confirmed { background: rgba(107,255,184,0.1); color: var(--success); border: 1px solid rgba(107,255,184,0.3); }
    .badge-pending   { background: rgba(255,200,100,0.1); color: #ffc864; border: 1px solid rgba(255,200,100,0.3); }

    .role-select { background: var(--bg); border: 1px solid var(--border); border-radius: 3px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 11px; padding: 5px 10px; cursor: pointer; outline: none; transition: border-color 0.2s; }
    .role-select:focus { border-color: var(--accent); }

    .empty-state { padding: 32px 24px; text-align: center; color: var(--muted); font-size: 12px; }
    .loading-row  { padding: 20px 24px; color: var(--muted); font-size: 12px; }

    /* Book list */
    .book-search-bar { padding: 12px 24px; border-bottom: 1px solid var(--border); background: rgba(124,106,255,0.03); }
    .book-search-bar input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 8px 12px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px; outline: none; transition: border-color 0.2s; }
    .book-search-bar input:focus { border-color: var(--accent); }
    .book-search-bar input::placeholder { color: var(--muted); }

    .book-row { display: grid; grid-template-columns: 2fr 1.5fr 1fr 80px; align-items: center; padding: 11px 24px; border-bottom: 1px solid var(--border); font-size: 12px; gap: 12px; transition: background 0.15s; }
    .book-row:last-child { border-bottom: none; }
    .book-row:hover { background: rgba(255,255,255,0.02); }
    .book-row.header { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); background: rgba(255,255,255,0.02); padding: 9px 24px; }
    .book-title  { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .book-author { color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .book-isbn   { color: var(--muted); }
    .book-edit { background: none; border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; padding: 4px 10px; border-radius: 2px; cursor: pointer; text-decoration: none; display: inline-block; text-align: center; transition: border-color 0.2s, color 0.2s; }
    .book-edit:hover { border-color: var(--accent); color: var(--accent); }
    .export-btn { background: none; border: 1px solid var(--border); color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; padding: 7px 14px; border-radius: 3px; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
    .export-btn:hover { border-color: var(--success); color: var(--success); }
  </style>
</head>
<body>
  <nav>
    <div class="nav-brand">Admin<span>.</span></div>
    <div class="nav-right">
      <span id="user-email-display"></span>
      <button class="logout-btn" onclick="handleLogout()">Sign Out</button>
    </div>
  </nav>

  <main>
    <div class="welcome">
      <h1>Dashboard</h1>
      <p>Manage users and reviews.</p>
    </div>

    <!-- Quick actions -->
    <div class="quick-actions">
  <a class="action-card" href="/admin-reviews.html">
    <div>
      <div class="action-card-label">Content</div>
      <div class="action-card-title">Manage Reviews</div>
    </div>
    <div class="action-card-arrow">→</div>
  </a>
  <a class="action-card" href="/reviewer.html?from=admin">
    <div>
      <div class="action-card-label">Content</div>
      <div class="action-card-title">Add New Book</div>
    </div>
    <div class="action-card-arrow">→</div>
  </a>
</div>

    <!-- Book List -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">All Books <span id="book-count" style="color:var(--muted)"></span></span>
        <button class="export-btn" onclick="exportCSV()">Export CSV</button>
      </div>
      <div class="book-search-bar">
        <input type="text" id="bookFilterInput" placeholder="Filter by title or author…" oninput="filterBookList(this.value)"/>
      </div>
      <div id="bookListPanel">
        <div class="loading-row">Loading books…</div>
      </div>
    </div>

    <!-- Users -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">All Users</span>
        <button class="invite-btn" onclick="toggleInvite()">+ Invite User</button>
      </div>
      <div class="invite-form" id="inviteForm">
        <input type="email" id="inviteEmail" placeholder="colleague@example.com"/>
        <button class="send-btn" onclick="sendInvite()">Send Invite</button>
      </div>
      <div class="invite-msg" id="inviteMsg"></div>
      <div id="userList"><div class="loading-row">Loading users…</div></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
  // ── CONFIG ── Replace with your actual Supabase project values ──────────
    const SUPABASE_URL = 'https://cqslqfztgtuuidgdkyyz.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_TBJdijzfEaYzBDBeqAy2CA_edJMKfgz';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = '/login.html'; return; }
      document.getElementById('user-email-display').textContent = session.user.email;
      document.body.classList.add('ready');
      loadUsers();
    }

    async function handleLogout() {
      await sb.auth.signOut();
      window.location.href = '/login.html';
    }

    async function getToken() {
      const { data } = await sb.auth.getSession();
      return data.session?.access_token;
    }

    async function loadUsers() {
      const list = document.getElementById('userList');
      try {
        const token = await getToken();
        const res = await fetch('/api/admin/users', { headers: { Authorization: `Bearer ${token}` } });
        if (!res.ok) throw new Error('Could not load users');
        const { users } = await res.json();
        list.innerHTML = '';
        if (!users?.length) { list.innerHTML = '<div class="empty-state">No users found.</div>'; return; }
        users.forEach(u => {
          const row = document.createElement('div');
          row.className = 'data-row';
          const confirmed = !!u.email_confirmed_at;
          const role = u.role || 'reviewer';
          row.innerHTML = `
            <div>
              <div class="row-email">${u.email}</div>
              <div class="row-meta">Added ${new Date(u.created_at).toLocaleDateString()}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <select class="role-select" data-id="${u.id}" onchange="updateRole(this)">
                <option value="reviewer" ${role==='reviewer'?'selected':''}>Reviewer</option>
                <option value="admin"    ${role==='admin'   ?'selected':''}>Admin</option>
              </select>
              <span class="user-badge ${confirmed?'badge-confirmed':'badge-pending'}">
                ${confirmed?'Active':'Pending'}
              </span>
            </div>`;
          list.appendChild(row);
        });
      } catch(e) {
        list.innerHTML = `<div class="empty-state">${e.message}</div>`;
      }
    }

    async function updateRole(select) {
      const token = await getToken();
      const res = await fetch('/api/admin/set-role', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ userId: select.dataset.id, role: select.value })
      });
      const data = await res.json();
      if (!res.ok) alert('Error: ' + data.error);
    }

    function toggleInvite() {
      const f = document.getElementById('inviteForm');
      f.classList.toggle('open');
      if (f.classList.contains('open')) document.getElementById('inviteEmail').focus();
    }

    async function sendInvite() {
      const email = document.getElementById('inviteEmail').value.trim();
      if (!email) { showInviteMsg('Please enter an email.', 'error'); return; }
      showInviteMsg('Sending…', '');
      const token = await getToken();
      const res = await fetch('/api/admin/invite', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      if (!res.ok) {
        showInviteMsg(data.error || 'Failed.', 'error');
      } else {
        showInviteMsg(`Invite sent to ${email}`, 'success');
        document.getElementById('inviteEmail').value = '';
        document.getElementById('inviteForm').classList.remove('open');
        setTimeout(loadUsers, 1500);
      }
    }

    function showInviteMsg(text, type) {
      const el = document.getElementById('inviteMsg');
      el.textContent = text;
      el.className = 'invite-msg ' + type;
    }

    // ── Books ─────────────────────────────────────────────────────────────
    let allBooks = [];

    async function loadBooks() {
      const panel = document.getElementById('bookListPanel');
      const { data, error } = await sb.from('books').select('id, title, author, isbn').order('title');
      if (error) { panel.innerHTML = `<div class="empty-state">${error.message}</div>`; return; }
      allBooks = data || [];
      document.getElementById('book-count').textContent = `(${allBooks.length})`;
      renderBookList(allBooks);
    }

    function renderBookList(books) {
      const panel = document.getElementById('bookListPanel');
      if (!books.length) { panel.innerHTML = '<div class="empty-state">No books found.</div>'; return; }
      panel.innerHTML = `
        <div class="book-row header">
          <div>Title</div><div>Author</div><div>ISBN</div><div></div>
        </div>` +
        books.map(b => `
          <div class="book-row">
            <div class="book-title">${b.title || ''}</div>
            <div class="book-author">${b.author || '—'}</div>
            <div class="book-isbn">${b.isbn || '—'}</div>
            <a class="book-edit" href="/admin-reviews.html?book=${b.id}">Edit</a>
          </div>`).join('');
    }

    function filterBookList(query) {
      const filtered = allBooks.filter(b =>
        (b.title||'').toLowerCase().includes(query.toLowerCase()) ||
        (b.author||'').toLowerCase().includes(query.toLowerCase())
      );
      renderBookList(filtered);
    }

    function exportCSV() {
      if (!allBooks.length) return;
      const rows = [['Title','Author','ISBN','ID']];
      allBooks.forEach(b => rows.push([
        `"${(b.title||'').replace(/"/g,'""')}"`,
        `"${(b.author||'').replace(/"/g,'""')}"`,
        `"${(b.isbn||'').replace(/"/g,'""')}"`,
        b.id
      ]));
      const csv  = rows.map(r => r.join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = 'books.csv'; a.click();
      URL.revokeObjectURL(url);
    }

    async function initAll() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = '/login.html'; return; }
      document.getElementById('user-email-display').textContent = session.user.email;
      document.body.classList.add('ready');
      loadUsers();
      loadBooks();
    }

    init = initAll;
    init();
  </script>
</body>
</html>
